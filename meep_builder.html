function srcHTML(s) {
  const is3D = S.cell.dim==='3D';
  const bc={ContinuousSource:'badge-c',GaussianSource:'badge-v',EigenModeSource:'badge-g',RandomDipoles:'badge-p'};

  // ── Type-specific extra fields ────────────────────────────────────────────
  let ex='';
  if(s.type==='ContinuousSource') ex=`
    <div style="background:rgba(0,229,255,.06);border:1px solid rgba(0,229,255,.15);border-radius:6px;padding:8px 10px;font-size:10px;color:var(--dim);line-height:1.6">
      💡 <strong style="color:var(--cyan)">ContinuousSource</strong> is a single-frequency CW (monochromatic) source — it runs until the simulation ends.
      Use it for steady-state field patterns. For transmission/reflection spectra use <strong style="color:#a78bfa">GaussianSource</strong> (broadband pulse).
    </div>`;
  if(s.type==='GaussianSource') {
    // Detect if this source looks like a planewave (spans ≥80% of a transverse cell dim)
    const _szx=s.szx||0,_szy=s.szy||0,_szz=s.szz||0;
    const _isPlanewave = s.srcPlane!=='none'
      || _szx>=S.cell.sx*0.8 || _szy>=S.cell.sy*0.8
      || (S.cell.dim==='3D'&&_szz>=(S.cell.sz||1)*0.8);
    const _kpOn = S.bc.kpointEnabled;
    // Coupling status
    const _needsIntegrated = _isPlanewave && _kpOn && !s.isIntegrated;
    const _needsKpoint     = s.isIntegrated && !_kpOn;
    ex=`
    <div class="grid2">
      <div class="fg"><label>Cutoff <span class="tip" data-t="Gaussian envelope cutoff in units of 1/fwidth. Higher = longer pulse.">?</span></label>
        <input type="number" value="${s.cutoff||5}" step="0.5" oninput="updS(${s.id},'cutoff',+this.value)"></div>
      <div class="fg">
        <label style="${_needsIntegrated?'color:#f87171':s.isIntegrated?'color:var(--cyan)':''}">
          is_integrated
          ${_isPlanewave?`<span style="font-size:9px;background:rgba(0,229,255,.12);border:1px solid rgba(0,229,255,.3);border-radius:3px;padding:1px 5px;color:var(--cyan);margin-left:4px">planewave detected</span>`:''}
          <span class="tip" data-t="Required for planewave sources that extend into PML. Ensures correct normalization when combined with k_point.">?</span>
        </label>
        <div class="rgrp" style="margin-top:4px">
          <div class="rbtn ${s.isIntegrated?'active':''}" onclick="updS(${s.id},'isIntegrated',true);renderStage(cur)">True</div>
          <div class="rbtn ${!s.isIntegrated?'active':''}" onclick="updS(${s.id},'isIntegrated',false);renderStage(cur)">False</div>
        </div>
        ${_needsIntegrated ? `
        <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:5px 8px;margin-top:5px;font-size:10px;color:#f87171;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          🔴 k_point is on — planewave needs <code>is_integrated=True</code>
          <button style="padding:2px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:4px;color:#f87171;font-size:10px;cursor:pointer"
            onclick="updS(${s.id},'isIntegrated',true);renderStage(cur)">Fix: set True</button>
        </div>` : ''}
        ${_needsKpoint ? `
        <div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);border-radius:5px;padding:5px 8px;margin-top:5px;font-size:10px;color:var(--amber);display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          ⚠ is_integrated=True requires k_point in Boundaries
          <button style="padding:2px 8px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:4px;color:var(--amber);font-size:10px;cursor:pointer"
            onclick="S.bc.kpointEnabled=true;updateScript();go(4)">Fix: go to Boundaries →</button>
        </div>` : ''}
        ${s.isIntegrated && _kpOn ? `
        <div style="font-size:9px;color:#6ee7b7;margin-top:4px">✓ k_point enabled — normalization correct</div>` : ''}
      </div>
    </div>`;};
  if(s.type==='EigenModeSource') ex=`
    <div class="grid3">
      <div class="fg"><label>Band</label><input type="number" value="${s.band||1}" min="1" oninput="updS(${s.id},'band',+this.value)"></div>
      <div class="fg"><label>eig_parity <span class="tip" data-t="Symmetry of the eigenmode. 2D: ODD_Z (TM) or EVEN_Z (TE). 3D: usually NO_PARITY or ODD_Z+EVEN_Y. Affects which mode band is found.">?</span></label>
        <select onchange="updS(${s.id},'parity',this.value)">
          ${[
            {v:'NO_PARITY',    l:'NO_PARITY — general (recommended for 3D)'},
            {v:'ODD_Z',        l:'ODD_Z — TM (2D default, Ez-like)'},
            {v:'EVEN_Z',       l:'EVEN_Z — TE (Hz-like)'},
            {v:'ODD_Y',        l:'ODD_Y — odd symmetry in Y'},
            {v:'EVEN_Y',       l:'EVEN_Y — even symmetry in Y'},
            {v:'ODD_Z+EVEN_Y', l:'ODD_Z+EVEN_Y — TM + even Y (3D slab TE)'},
            {v:'EVEN_Z+ODD_Y', l:'EVEN_Z+ODD_Y — TE + odd Y (3D slab TM)'},
          ].map(o=>`<option value="${o.v}" ${(s.parity||'ODD_Z')===o.v?'selected':''}>${o.l}</option>`).join('')}
        </select>
      </div>
      <div class="fg" style="display:flex;align-items:flex-end">
        <div style="font-size:10px;color:var(--dim);padding-bottom:4px;line-height:1.5">
          ${S.cell.dim==='3D'
            ? `<span style="color:var(--amber)">⚠ 3D cell — consider <span style="font-family:'IBM Plex Mono',monospace">NO_PARITY</span> unless you know the mode symmetry</span>`
            : `<span style="color:var(--dim)">2D: ODD_Z=TM, EVEN_Z=TE</span>`}
        </div>
      </div>
    </div>`;
  if(s.type==='RandomDipoles') ex=`
    <div class="grid3">
      <div class="fg"><label>N dipoles</label><input type="number" value="${s.ndip||6}" min="1" oninput="updS(${s.id},'ndip',+this.value)"></div>
      <div class="fg"><label>Region W</label><input type="number" value="${s.rw||0.5}" step="0.1" oninput="updS(${s.id},'rw',+this.value)"></div>
      <div class="fg"><label>Region H</label><input type="number" value="${s.rh||0.05}" step="0.05" oninput="updS(${s.id},'rh',+this.value)"></div>
    </div>`;

  // ── Polarization toggle (all except RandomDipoles) ────────────────────────
  const compToggle = s.type!=='RandomDipoles' ? `
    <div class="sdiv" style="margin:8px 0 6px">Polarization (Field Component)</div>
    <div class="rgrp" style="margin-bottom:4px">
      ${['Ez','Ex','Ey','Hz','Hx','Hy'].map(c=>`
        <div class="rbtn ${(s.comp||'Ez')===c?'active':''}" style="padding:4px 11px;font-size:11px;font-family:'IBM Plex Mono',monospace"
          onclick="updS(${s.id},'comp','${c}');renderStage(cur)">${c}</div>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--dim)">${
      (s.comp||'Ez').startsWith('E') ? 'Electric field component — TM-like polarization' : 'Magnetic field component — TE-like polarization'
    }</div>` : '';

  // ── Plane selector ────────────────────────────────────────────────────────
  const sp = s.srcPlane || 'none';
  const planeInfo = {
    XY:{ hint:'Normal to Z — Center Z sets injection depth, source spans full X×Y', injectAxis:'Z' },
    XZ:{ hint:'Normal to Y — Center Y sets injection depth, source spans full X×Z', injectAxis:'Y' },
    YZ:{ hint:'Normal to X — Center X sets injection depth, source spans full Y×Z', injectAxis:'X' },
    none:{ hint:'Point/custom — all center fields define position freely', injectAxis:'' },
  };
  const pi = planeInfo[sp];
  const isInjectX=sp==='YZ', isInjectY=sp==='XZ', isInjectZ=sp==='XY';

  // Direction options per plane
  const dirOptions={XY:['+Z','−Z'],XZ:['+Y','−Y'],YZ:['+X','−X'],none:['+X','−X','+Y','−Y','+Z','−Z']};
  const dirs=dirOptions[sp]||dirOptions.none;
  const curDir=s.srcDir||(sp==='YZ'?'+X':sp==='XZ'?'+Y':sp==='XY'?'+Z':'+X');

  const planeSelectorHTML = is3D ? `
    <div class="sdiv" style="margin:4px 0 8px">Source Plane</div>
    <div class="rgrp" style="margin-bottom:6px">
      ${['XY','XZ','YZ','none'].map(pl=>{
        const defDir=pl==='YZ'?'+X':pl==='XZ'?'+Y':pl==='XY'?'+Z':'+X';
        return `<div class="rbtn ${sp===pl?'active':''}" style="padding:4px 12px;font-size:11px" onclick="
          updS(${s.id},'srcPlane','${pl}');
          updS(${s.id},'srcDir','${defDir}');
          ${pl==='XY'?`updS(${s.id},'szx',${S.cell.sx});updS(${s.id},'szy',${S.cell.sy});updS(${s.id},'szz',0);`:''}
          ${pl==='XZ'?`updS(${s.id},'szx',${S.cell.sx});updS(${s.id},'szy',0);updS(${s.id},'szz',${S.cell.sz});`:''}
          ${pl==='YZ'?`updS(${s.id},'szx',0);updS(${s.id},'szy',${S.cell.sy});updS(${s.id},'szz',${S.cell.sz});`:''}
          ${pl==='none'?`updS(${s.id},'szx',0);updS(${s.id},'szy',0);updS(${s.id},'szz',0);`:''}
          renderStage(cur)">${pl==='none'?'Point':pl}</div>`;
      }).join('')}
    </div>
    <div style="font-size:10px;color:${sp!=='none'?'var(--cyan)':'var(--dim)'};margin-bottom:10px;font-family:'IBM Plex Mono',monospace">${pi.hint}</div>
    <div class="sdiv" style="margin:4px 0 8px">Propagation Direction</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div class="rgrp">
        ${dirs.map(d=>`<div class="rbtn ${curDir===d?'active':''}" style="padding:4px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace"
          onclick="updS(${s.id},'srcDir','${d}');renderStage(cur)">${d}</div>`).join('')}
      </div>
      <span style="font-size:10px;color:var(--dim)">wave travels in ${curDir}</span>
    </div>` : `
    <div class="sdiv" style="margin:4px 0 8px">Propagation Direction</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div class="rgrp">
        ${['+X','−X','+Y','−Y'].map(d=>`<div class="rbtn ${curDir===d?'active':''}" style="padding:4px 10px;font-size:11px;font-family:'IBM Plex Mono',monospace"
          onclick="updS(${s.id},'srcDir','${d}');renderStage(cur)">${d}</div>`).join('')}
      </div>
      <span style="font-size:10px;color:var(--dim)">wave travels in ${curDir}</span>
    </div>`;

  // ── Frequency range ───────────────────────────────────────────────────────
  // ContinuousSource only needs fcen (single frequency), not a range
  const freqSection = s.type==='ContinuousSource' ? `
    <div class="sdiv" style="margin:8px 0 6px">Frequency</div>
    <div class="grid2">
      <div class="fg">
        <label>Wavelength <span class="tip" data-t="Enter wavelength → fcen auto-computed as 1/λ">?</span></label>
        <input id="wvl-input-${s.id}" type="number" value="${s.wavelength||(1/(s.fcen||0.15)).toFixed(4)}" step="0.1" min="0.01"
          oninput="
            const wl=+this.value;
            const fc=wl>0?1/wl:0.15;
            updS(${s.id},'wavelength',wl);
            updS(${s.id},'fcen',+fc.toFixed(6));
            const span=document.getElementById('fcen-display-${s.id}');
            if(span) span.textContent=fc.toFixed(6);
            const finput=document.getElementById('fcen-input-${s.id}');
            if(finput) finput.value=fc.toFixed(6);
          ">
        <div style="font-size:10px;color:var(--dim);margin-top:3px">
          fcen = <span id="fcen-display-${s.id}" style="color:var(--cyan);font-family:'IBM Plex Mono',monospace">${(s.fcen||0.15).toFixed(6)}</span>
          &nbsp;<span style="color:var(--dim)">(= 1 / λ)</span>
        </div>
      </div>
      <div class="fg">
        <label>fcen <span class="tip" data-t="Direct frequency input — updates wavelength automatically">?</span></label>
        <input id="fcen-input-${s.id}" type="number" value="${s.fcen||0.15}" step="0.01" min="0.001"
          oninput="
            const fc=+this.value;
            const wl=fc>0?1/fc:6.633;
            updS(${s.id},'fcen',fc);
            updS(${s.id},'wavelength',+wl.toFixed(4));
            const span=document.getElementById('fcen-display-${s.id}');
            if(span) span.textContent=fc.toFixed(6);
            const winput=document.getElementById('wvl-input-${s.id}');
            if(winput) winput.value=wl.toFixed(4);
          ">
      </div>
    </div>
    <div class="grid2" style="margin-top:6px">
      <div class="fg">
        <label>Width (turn-on time) <span class="tip" data-t="Tanh ramp-on duration in time units. Prevents exciting spurious frequencies at t=0. Tutorial uses width=20.">?</span></label>
        <input type="number" value="${s.csWidth||0}" step="1" min="0"
          oninput="updS(${s.id},'csWidth',+this.value)">
        <div style="font-size:10px;color:var(--dim);margin-top:2px">${(s.csWidth||0)===0?'0 = sharp turn-on (instant)':'Slow ramp over ~'+((s.csWidth||0)/6.283).toFixed(1)+' periods'}</div>
      </div>
      <div class="fg">
        <label>Amplitude</label>
        <input type="number" value="${s.amp||1}" step="0.1" oninput="updS(${s.id},'amp',+this.value)">
      </div>
    </div>` : `
    <div class="sdiv" style="margin:8px 0 6px">Frequency Range</div>
    <div class="grid3">
      <div class="fg"><label>f-min <span class="tip" data-t="Minimum frequency">?</span></label>
        <input type="number" value="${s.fmin||0.1}" step="0.01" oninput="updS(${s.id},'fmin',+this.value)"></div>
      <div class="fg"><label>f-max <span class="tip" data-t="Maximum frequency">?</span></label>
        <input type="number" value="${s.fmax||0.5}" step="0.01" oninput="updS(${s.id},'fmax',+this.value)"></div>
      <div class="fg"><label>nfreq</label>
        <input type="number" value="${s.nfreq||100}" min="1" oninput="updS(${s.id},'nfreq',+this.value)"></div>
    </div>
    <div style="font-size:10px;color:var(--dim);margin-top:-2px">
      fcen = <span style="color:var(--cyan);font-family:'IBM Plex Mono',monospace">${(((s.fmin||0.1)+(s.fmax||0.5))/2).toFixed(4)}</span>
      &nbsp; fwidth = <span style="color:var(--cyan);font-family:'IBM Plex Mono',monospace">${((s.fmax||0.5)-(s.fmin||0.1)).toFixed(4)}</span>
    </div>`;

  // ── Size ──────────────────────────────────────────────────────────────────
  // Compute a human-readable description of the current size
  const szx=s.szx||0, szy=s.szy||0, szz=s.szz||0;
  const sizeDesc = (()=>{
    if(szx===0&&szy===0&&szz===0) return {txt:'Point source', col:'var(--dim)'};
    if(szz===0&&szx>0&&szy>0)    return {txt:`Plane source — XY (${szx}×${szy})`, col:'var(--cyan)'};
    if(szy===0&&szx>0&&szz>0)    return {txt:`Plane source — XZ (${szx}×${szz})`, col:'var(--cyan)'};
    if(szx===0&&szy>0&&szz>0)    return {txt:`Plane source — YZ (${szy}×${szz})`, col:'var(--cyan)'};
    if(szx>0&&szy===0&&szz===0)  return {txt:`Line source along X (${szx})`, col:'var(--cyan)'};
    if(szx===0&&szy>0&&szz===0)  return {txt:`Line source along Y (${szy})`, col:'var(--cyan)'};
    if(szx===0&&szy===0&&szz>0)  return {txt:`Line source along Z (${szz})`, col:'var(--cyan)'};
    return {txt:`Volume source (${szx}×${szy}×${szz})`, col:'var(--amber)'};
  })();
  // Quick-fill presets: build from cell dims
  const fillBtns = S.cell.dim==='2D' ? `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
      <span style="font-size:10px;color:var(--dim);line-height:24px">Quick fill:</span>
      <button style="padding:2px 8px;font-size:10px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:4px;color:var(--cyan);cursor:pointer"
        onclick="updS(${s.id},'szx',${S.cell.sy});updS(${s.id},'szy',0);updS(${s.id},'srcPlane','none');renderStage(cur)">Line Y (sz=${S.cell.sy})</button>
      <button style="padding:2px 8px;font-size:10px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:4px;color:var(--cyan);cursor:pointer"
        onclick="updS(${s.id},'szx',0);updS(${s.id},'szy',${S.cell.sy});updS(${s.id},'srcPlane','none');renderStage(cur)">Line X+Y (${S.cell.sy})</button>
      <button style="padding:2px 8px;font-size:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer"
        onclick="updS(${s.id},'szx',0);updS(${s.id},'szy',0);renderStage(cur)">Point</button>
    </div>` : `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
      <span style="font-size:10px;color:var(--dim);line-height:24px">Quick fill:</span>
      <button style="padding:2px 8px;font-size:10px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:4px;color:var(--cyan);cursor:pointer"
        onclick="updS(${s.id},'szx',0);updS(${s.id},'szy',${S.cell.sy});updS(${s.id},'szz',${S.cell.sz});updS(${s.id},'srcPlane','YZ');updS(${s.id},'srcDir','+X');renderStage(cur)">YZ plane</button>
      <button style="padding:2px 8px;font-size:10px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:4px;color:var(--cyan);cursor:pointer"
        onclick="updS(${s.id},'szx',${S.cell.sx});updS(${s.id},'szy',0);updS(${s.id},'szz',${S.cell.sz});updS(${s.id},'srcPlane','XZ');updS(${s.id},'srcDir','+Y');renderStage(cur)">XZ plane</button>
      <button style="padding:2px 8px;font-size:10px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);border-radius:4px;color:var(--cyan);cursor:pointer"
        onclick="updS(${s.id},'szx',${S.cell.sx});updS(${s.id},'szy',${S.cell.sy});updS(${s.id},'szz',0);updS(${s.id},'srcPlane','XY');updS(${s.id},'srcDir','+Z');renderStage(cur)">XY plane</button>
      <button style="padding:2px 8px;font-size:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer"
        onclick="updS(${s.id},'szx',0);updS(${s.id},'szy',0);updS(${s.id},'szz',0);updS(${s.id},'srcPlane','none');renderStage(cur)">Point</button>
    </div>`;
  const sizeSection= S.cell.dim==='2D' ? `
    <div class="sdiv" style="margin:8px 0 6px">Size <span class="tip" data-t="0 = point source. Use quick-fill buttons or the plane selector to auto-fill for a plane source.">?</span></div>
    ${fillBtns}
    <div style="font-size:10px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;color:${sizeDesc.col}">${sizeDesc.txt}</div>
    <div class="grid2">
      <div class="fg"><label>Size X</label><input type="number" value="${s.szx||0}" step="0.5" min="0" oninput="updS(${s.id},'szx',+this.value);updS(${s.id},'srcPlane','none');renderStage(cur)"></div>
      <div class="fg"><label>Size Y</label><input type="number" value="${s.szy||0}" step="0.5" min="0" oninput="updS(${s.id},'szy',+this.value);updS(${s.id},'srcPlane','none');renderStage(cur)"></div>
    </div>` : `
    <div class="sdiv" style="margin:8px 0 6px">Size <span class="tip" data-t="0 = point source. Use quick-fill buttons or the plane selector to set a plane source spanning the full cell cross-section.">?</span></div>
    ${fillBtns}
    <div style="font-size:10px;margin-bottom:6px;font-family:'IBM Plex Mono',monospace;color:${sizeDesc.col}">${sizeDesc.txt}</div>
    <div class="grid3">
      <div class="fg"><label>Size X</label><input type="number" value="${s.szx||0}" step="0.5" min="0" oninput="updS(${s.id},'szx',+this.value);updS(${s.id},'srcPlane','none');renderStage(cur)"></div>
      <div class="fg"><label>Size Y</label><input type="number" value="${s.szy||0}" step="0.5" min="0" oninput="updS(${s.id},'szy',+this.value);updS(${s.id},'srcPlane','none');renderStage(cur)"></div>
      <div class="fg"><label>Size Z</label><input type="number" value="${s.szz||0}" step="0.5" min="0" oninput="updS(${s.id},'szz',+this.value);updS(${s.id},'srcPlane','none');renderStage(cur)"></div>
    </div>`;

  // ── Position — all 3 axes always editable, injection axis highlighted ──────
  const cxLabel = isInjectX ? 'Center X ★' : 'Center X';
  const cyLabel = isInjectY ? 'Center Y ★' : 'Center Y';
  const czLabel = isInjectZ ? 'Center Z ★' : 'Center Z';
  const hlStyle = 'border-color:var(--cyan);box-shadow:0 0 0 2px rgba(0,229,255,0.15)';

  return `<div class="card" id="src-${s.id}">
    <div class="card-hdr">
      <span class="badge ${bc[s.type]||'badge-c'}">${s.type}</span>
      <button class="xbtn" onclick="remS(${s.id})">✕</button>
    </div>
    ${planeSelectorHTML}
    <div class="sdiv" style="margin:4px 0 8px">Position</div>
    <div class="${S.cell.dim==='2D'?'grid2':'grid3'}">
      <div class="fg"><label style="${isInjectX?'color:var(--cyan)':''}">${cxLabel}</label>
        <input type="number" value="${s.cx||0}" step="0.5" style="${isInjectX?hlStyle:''}" oninput="updS(${s.id},'cx',+this.value)"></div>
      <div class="fg"><label style="${isInjectY?'color:var(--cyan)':''}">${cyLabel}</label>
        <input type="number" value="${s.cy||0}" step="0.5" style="${isInjectY?hlStyle:''}" oninput="updS(${s.id},'cy',+this.value)"></div>
      ${S.cell.dim!=='2D'?`<div class="fg"><label style="${isInjectZ?'color:var(--cyan)':''}">${czLabel}</label>
        <input type="number" value="${s.cz||0}" step="0.5" style="${isInjectZ?hlStyle:''}" oninput="updS(${s.id},'cz',+this.value)"></div>`:''}
    </div>
    ${compToggle}
    ${s.type!=='ContinuousSource'?`<div class="fg" style="margin-top:4px"><label>Amplitude</label><input type="number" value="${s.amp||1}" step="0.1" oninput="updS(${s.id},'amp',+this.value)"></div>`:''}
    ${freqSection}
    ${sizeSection}
    ${ex}
  </div>`;
}

function monHTML(m) {
  const cols={transmission:'badge-g',reflection:'badge-p',substrate:'badge-a',nearfar:'badge-c'};
  // Auto-detect dominant plane from sizes for display hint
  const msx=m.msx||0,msy=m.msy||0,msz=m.msz||0;
  let planeHint='';
  if(msz===0&&msx>0&&msy>0) planeHint='XY plane (normal Z)';
  else if(msy===0&&msx>0&&msz>0) planeHint='XZ plane (normal Y)';
  else if(msx===0&&msy>0&&msz>0) planeHint='YZ plane (normal X)';
  else if(msx===0&&msy===0&&msz===0) planeHint='Point monitor';
  else planeHint='Custom / volumetric';
  const is2D = S.cell.dim==='2D';
  const roleColors = {refl:'#a78bfa', tran:'#6ee7b7', none:'var(--dim)'};
  const roleLabels = {refl:'↩ Refl', tran:'↪ Tran', none:'— None'};
  const roleSelectorHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:6px 10px">
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
        <span style="font-size:10px;color:var(--dim);white-space:nowrap">T/R Role:</span>
        ${['refl','tran','none'].map(r=>`
          <div style="cursor:pointer;padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;
            background:${m.role===r?`rgba(${r==='refl'?'167,139,250':r==='tran'?'110,231,183':'120,120,120'},.18)`:'transparent'};
            color:${m.role===r?roleColors[r]:'var(--dim)'};
            border:1px solid ${m.role===r?roleColors[r]:'transparent'};
            transition:all .15s"
            onclick="updM(${m.id},'role','${r}');updateScript();renderStage(cur)">
            ${roleLabels[r]}
          </div>`).join('')}
      </div>
      ${m.role==='tran' ? `
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
        <span style="font-size:10px;color:var(--dim);white-space:nowrap">Label:</span>
        <input type="text" value="${m.tranLabel||'tran'}"
          style="flex:1;padding:3px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:rgba(110,231,183,.07);border:1px solid rgba(110,231,183,.3);border-radius:4px;color:#6ee7b7"
          placeholder="e.g. straight, bend, port2"
          oninput="updM(${m.id},'tranLabel',this.value);updateScript()">
        <span style="font-size:9px;color:var(--dim)">→ T_${m.tranLabel||'tran'}</span>
      </div>` : ''}
      ${m.role==='refl' ? `
      <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
        <span style="font-size:10px;color:var(--dim);white-space:nowrap">Label:</span>
        <input type="text" value="${m.reflLabel||'refl'}"
          style="flex:1;padding:3px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.3);border-radius:4px;color:#a78bfa"
          placeholder="e.g. refl, back, port1"
          oninput="updM(${m.id},'reflLabel',this.value);updateScript()">
        <span style="font-size:9px;color:var(--dim)">→ R_${m.reflLabel||'refl'}</span>
      </div>` : ''}
    </div>`;
  return `<div class="card" id="mon-${m.id}">
    <div class="card-hdr">
      <span class="badge ${cols[m.type]}">${m.type}</span>
      ${m.role!=='none' ? `<span style="font-size:10px;font-weight:700;color:${roleColors[m.role]};margin-left:6px;font-family:'IBM Plex Mono',monospace">[${m.role==='tran'?(m.tranLabel||'tran').toUpperCase():m.role==='refl'?(m.reflLabel||'refl').toUpperCase():''}]</span>` : ''}
      <span style="font-size:10px;color:var(--cyan);font-family:'IBM Plex Mono',monospace;margin-left:8px">${planeHint}</span>
      <button class="xbtn" onclick="remM(${m.id})" style="margin-left:auto">✕</button>
    </div>
    ${roleSelectorHTML}
    <div class="sdiv" style="margin:4px 0 8px">Center Position</div>
    <div class="${is2D?'grid2':'grid3'}">
      <div class="fg"><label>Center X</label><input type="number" value="${m.cx||0}" step="0.5" oninput="updM(${m.id},'cx',+this.value)"></div>
      <div class="fg"><label>Center Y</label><input type="number" value="${m.cy||0}" step="0.5" oninput="updM(${m.id},'cy',+this.value)"></div>
      ${!is2D?`<div class="fg"><label>Center Z</label><input type="number" value="${m.cz||0}" step="0.5" oninput="updM(${m.id},'cz',+this.value)"></div>`:''}
    </div>
    <div class="sdiv" style="margin:8px 0 8px">Size <span class="tip" data-t="${is2D?'Set one axis to 0 to make a line monitor':'Set one axis to 0 to make a plane monitor'}">?</span></div>
    <div class="${is2D?'grid2':'grid3'}">
      <div class="fg"><label>Size X</label><input type="number" value="${msx}" step="0.5" min="0" oninput="updM(${m.id},'msx',+this.value)"></div>
      <div class="fg"><label>Size Y</label><input type="number" value="${msy}" step="0.5" min="0" oninput="updM(${m.id},'msy',+this.value)"></div>
      ${!is2D?`<div class="fg"><label>Size Z</label><input type="number" value="${msz}" step="0.5" min="0" oninput="updM(${m.id},'msz',+this.value)"></div>`:''}
    </div>
    ${is2D ? `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px">
      <button style="background:rgba(16,217,138,.08);border:1px solid var(--green);color:var(--green);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer" onclick="updM(${m.id},'msx',0);updM(${m.id},'msy',${S.cell.sy});updM(${m.id},'msz',0);renderStage(cur)">Vertical line (full Y)</button>
      <button style="background:rgba(16,217,138,.08);border:1px solid var(--green);color:var(--green);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer" onclick="updM(${m.id},'msx',${S.cell.sx});updM(${m.id},'msy',0);updM(${m.id},'msz',0);renderStage(cur)">Horizontal line (full X)</button>
    </div>` : `
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px">
      ${[
        {label:'XY plane', check: msx>0&&msy>0&&msz===0, onclick:`updM(${m.id},'msx',${S.cell.sx});updM(${m.id},'msy',${S.cell.sy});updM(${m.id},'msz',0);renderStage(cur)`},
        {label:'XZ plane', check: msx>0&&msz>0&&msy===0, onclick:`updM(${m.id},'msx',${S.cell.sx});updM(${m.id},'msy',0);updM(${m.id},'msz',${S.cell.sz});renderStage(cur)`},
        {label:'YZ plane', check: msy>0&&msz>0&&msx===0, onclick:`updM(${m.id},'msx',0);updM(${m.id},'msy',${S.cell.sy});updM(${m.id},'msz',${S.cell.sz});renderStage(cur)`}
      ].map(b=>`<button style="background:${b.check?'rgba(16,217,138,.22)':'rgba(16,217,138,.08)'};border:1px solid ${b.check?'var(--green)':'rgba(16,217,138,.35)'};color:var(--green);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:${b.check?'700':'400'}"
        onclick="${b.onclick}">${b.label}${b.check?' ✓':''}</button>`).join('')}
    </div>`}

    ${(()=>{
      // Infer the correct normal axis from zero-size dimension
      const zeroAxes=[];
      if(msx===0) zeroAxes.push('X');
      if(msy===0) zeroAxes.push('Y');
      if(msz===0) zeroAxes.push('Z');
      const inferredNormal = zeroAxes.length===1 ? zeroAxes[0] : null;
      const manualDir = m.dir||'auto';
      const conflict = manualDir!=='auto' && inferredNormal && manualDir!==inferredNormal;
      const isPoint  = msx===0 && msy===0 && msz===0;
      // Build readable auto-description
      let autoDesc='';
      if(isPoint)            autoDesc='point — no flux direction';
      else if(inferredNormal) autoDesc=`normal=${inferredNormal} (${['X','Y','Z'].filter(a=>a!==inferredNormal).join('')} plane)`;
      else                    autoDesc='volumetric / custom';
      return `<div style="margin-top:8px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:10px;color:var(--dim);white-space:nowrap;font-weight:700">FluxRegion direction:</span>
          <div class="rgrp">
            ${['auto','X','Y','Z'].map(d=>`<div class="rbtn ${manualDir===d?'active':''}"
              style="padding:2px 9px;font-size:10px;font-family:'IBM Plex Mono',monospace;${conflict&&d===manualDir?'border-color:#f87171;color:#f87171;background:rgba(239,68,68,.12)':''}"
              onclick="updM(${m.id},'dir','${d}');renderStage(cur)">${d==='auto'?'auto':d}</div>`).join('')}
          </div>
          <span style="font-size:10px;color:var(--dim);white-space:nowrap;margin-left:4px">Weight:</span>
          <input type="number" value="${m.weight!==undefined?m.weight:1}" step="0.1" style="width:60px;padding:2px 6px;font-size:10px"
            oninput="updM(${m.id},'weight',+this.value)">
        </div>
        <div style="margin-top:5px;font-size:10px;line-height:1.6">
          ${manualDir==='auto'
            ? `<span style="color:var(--dim)">→ MEEP infers: <span style="color:var(--cyan);font-family:'IBM Plex Mono',monospace">${autoDesc}</span></span>`
            : `<span style="color:var(--dim)">→ <span style="font-family:'IBM Plex Mono',monospace;color:${conflict?'#f87171':'var(--cyan)'}">direction=mp.${manualDir}, weight=${m.weight!==undefined?m.weight:1}</span></span>`
          }
          ${conflict ? `
          <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:5px 8px;margin-top:4px;color:#f87171;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            🔴 Conflict: size implies normal=${inferredNormal} but direction=${manualDir} — flux may be zero or wrong sign
            <button style="padding:2px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:4px;color:#f87171;font-size:10px;cursor:pointer"
              onclick="updM(${m.id},'dir','auto');renderStage(cur)">Fix: reset to auto</button>
            <button style="padding:2px 8px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:4px;color:#f87171;font-size:10px;cursor:pointer"
              onclick="updM(${m.id},'dir','${inferredNormal}');renderStage(cur)">Fix: set ${inferredNormal}</button>
          </div>` : ''}
          ${isPoint && manualDir!=='auto' ? `
          <div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.3);border-radius:5px;padding:5px 8px;margin-top:4px;color:var(--amber)">
            ⚠ Point monitor (all sizes=0) — direction has no meaning. Set to auto or give the monitor a nonzero size.
          </div>` : ''}
        </div>
      </div>`;
    })()}
  </div>`;
}

// ─── VIEWER WIDGET ─────────────────────────────────────────────────────────
function viewerWidget() {
  const is3D = S.cell.dim==='3D';
  return `<div class="viewer-wrap">
    <div class="viewer-hdr">
      <div class="viewer-tabs">
        <div class="vtab active" onclick="switchView('v2d',this)">2D</div>
        <div class="vtab" onclick="switchView('vstack',this)">Stack</div>

}

function switchView(id, el) {
  document.querySelectorAll('.view-area').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  const planeTabs=document.getElementById('plane-tabs');
  if(planeTabs) planeTabs.style.display=(id==='v2d')?'flex':'none';
  if(id==='v2d') draw2D('c2d',S.view2dPlane);
  else if(id==='vstack') drawStack();
  else if(id==='v3d') { setTimeout(()=>{ if(!three.renderer) initRenderer(); else render3D(); },50); }
}

</div>

        onclick="S.run.trDecayPx=${sug.px};S.run.trDecayPy=${sug.py};S.run.trDecayPz=${sug.pz};updateScript();renderStage(6)">Use suggestion</button>` : `<span style="font-size:10px;color:#6ee7b7">✓ using suggestion</span>`}

<div class="sdiv">Plot X-Axis</div>

    onclick="S.run.trPlotX='frequency';updateScript();renderStage(6)">Frequency (f)</div>

${S.run.scatterMode ? `

    const szx=s.szx||0,szy=s.szy||0,szz=s.szz||0;
    const isPlane = s.srcPlane!=='none'
      || szx>=S.cell.sx*0.8 || szy>=S.cell.sy*0.8
      || (S.cell.dim==='3D' && szz>=(S.cell.sz||1)*0.8);
    const isGaussian = s.type==='GaussianSource';
    const ok = isPlane && isGaussian;
    return {s, i, isPlane, isGaussian, ok};
  });
  const allOk = srcChecks.length>0 && srcChecks.every(c=>c.ok);
  const noSources = srcChecks.length===0;
  if(allOk) return `<div style="background:rgba(16,217,138,.06);border:1px solid rgba(16,217,138,.25);border-radius:7px;padding:8px 12px;font-size:11px;color:#6ee7b7;margin-bottom:10px">✅ Source is a broadband planewave — scattering normalization will be correct.</div>`;
  if(noSources) return '';
  return `<div style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.3);border-radius:7px;padding:10px 13px;font-size:11px;margin-bottom:10px">
    <div style="color:#f87171;font-weight:700;margin-bottom:6px">🔴 Source setup issue — scattered-field method requires a full-cell planewave</div>
    ${srcChecks.map(({s,i,isPlane,isGaussian,ok})=>{
      if(ok) return `<div style="color:#6ee7b7;margin-bottom:4px">✅ Source ${i+1} (${s.type}): planewave — OK</div>`;
      const problems = [];
      if(!isGaussian) problems.push(`type is <code style="color:#f87171">${s.type}</code> — must be <strong>GaussianSource</strong> for broadband flux normalization`);
      if(!isPlane)    problems.push(`size is too small — source must span the full cell transversely (use a quick-fill plane button in Stage 4)`);
      // Quick fix button: set to GaussianSource + full-cell YZ plane (most common scatter setup)
      const fixDir = s.srcDir||'+X';
      const fixPlane = fixDir.endsWith('X')?'YZ': fixDir.endsWith('Y')?'XZ':'XY';
      const fixSzx = fixPlane==='YZ'?0:S.cell.sx;
      const fixSzy = fixPlane==='XZ'?0:S.cell.sy;
      const fixSzz = S.cell.dim==='3D'?(fixPlane==='XY'?0:S.cell.sz):0;
      return `<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:5px;padding:6px 10px;margin-bottom:6px">
        <span style="color:var(--dim)">Source ${i+1}:</span>
        ${problems.map(p=>`<div style="color:#fca5a5;margin:2px 0 0 8px">• ${p}</div>`).join('')}
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
          ${!isGaussian?`<button style="padding:2px 9px;font-size:10px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:4px;color:#f87171;cursor:pointer"
            onclick="updS(${s.id},'type','GaussianSource');renderStage(cur)">Fix: use GaussianSource</button>`:''}
          ${!isPlane?`<button style="padding:2px 9px;font-size:10px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:4px;color:#f87171;cursor:pointer"
            onclick="updS(${s.id},'szx',${fixSzx});updS(${s.id},'szy',${fixSzy});updS(${s.id},'szz',${fixSzz});updS(${s.id},'srcPlane','${fixPlane}');updS(${s.id},'srcDir','${fixDir}');renderStage(cur)">Fix: make ${fixPlane} planewave</button>`:''}
        </div>
      </div>`;
    }).join('')}
    <div style="font-size:10px;color:var(--dim);margin-top:4px;line-height:1.6">
      The incident flux box (<em>Run 1</em>) must capture the full beam. A point or narrow source gives wrong cross-section normalization.
    </div>
  </div>`;
})()}

<div class="sdiv">Scatter Target Geometry</div>
${S.geo.length===0

      ${sg.type==='Pyramid'?`· ${sg.wx}×${sg.wz||sg.wx}, h=${sg.h}`:''}
      <span style="color:var(--dim)"> · Edit in Stage 2 to change</span>

// Returns mp.Vector3 string for a given axis value, or null if axis is null
function axisVec(axis) {
  if(!axis) return null;
  if(axis==='+X') return 'mp.Vector3(1,0,0)';
  if(axis==='-X') return 'mp.Vector3(-1,0,0)';
  if(axis==='+Y') return 'mp.Vector3(0,1,0)';
  if(axis==='-Y') return 'mp.Vector3(0,-1,0)';
  if(axis==='+Z') return 'mp.Vector3(0,0,1)';
  if(axis==='-Z') return 'mp.Vector3(0,0,-1)';
  return null;
}

function matStr(mat,eps){
  if(mat==='air')return'mp.air';
  if(mat==='silicon')return'mp.Medium(epsilon=12)';
  if(mat==='sio2')return'mp.Medium(epsilon=2.1)';
  if(mat==='ito')return'mp.Medium(epsilon=3.7)';
  if(mat==='organic')return'mp.Medium(epsilon=3.0)';
  if(mat==='custom')return`mp.Medium(epsilon=${eps||1})`;
  if(mat==='gold')return`mp.Medium(epsilon=-100, E_susceptibilities=[mp.DrudeSusceptibility(frequency=0.333, gamma=0.013, sigma=1)])`;
  if(mat==='aluminum')return`mp.Medium(epsilon=-50, E_susceptibilities=[mp.DrudeSusceptibility(frequency=0.250, gamma=0.008, sigma=1)])`;
  if(mat==='platinum')return`mp.Medium(epsilon=-30, E_susceptibilities=[mp.DrudeSusceptibility(frequency=0.333, gamma=0.046, sigma=1)])`;
  // Custom dispersive material — reference variable name
  if(mat && mat.startsWith('disp_')){
    const dm=(S.mats?.dispMats||[]).find(d=>'disp_'+d.id===mat);
    return dm ? dm.varName||('mat_'+dm.id) : 'mp.air';
  }
  return'mp.air';
}

// ─── SCRIPT GENERATOR ────────────────────────────────────────────────────
// ─── SIMULATION TIME ESTIMATE ────────────────────────────────────────────
// Returns {cells, steps, label, detail} rough estimate
function simTimeEstimate(T) {
  const res = S.cell.res || 10;
  const sx = S.cell.sx || 16, sy = S.cell.sy || 8, sz = S.cell.sz || 1;
  const is3D = S.cell.dim === '3D';
  // Grid cells in spatial domain
  const cellVol = is3D ? sx*sy*sz : sx*sy;
  const gridCells = Math.round(cellVol * Math.pow(res, is3D?3:2));
  // Time steps = T × res (Courant: dt = 0.5/res in 2D, ~0.577/res in 3D; ~T×res total steps)
  const steps = Math.round(T * res);
  const totalUpdates = gridCells * steps;
  // Rough: ~2ns per cell-update on a single modern CPU core (empirical MEEP benchmark)
  const ns = totalUpdates * 2e-9;
  const np = (S.run.mpi && S.run.np>1) ? S.run.np : 1;
  const sec = ns / np;
  let label, col;
  if(sec < 5)       { label = `< 5 s`;        col = '#6ee7b7'; }
  else if(sec < 60) { label = `~${Math.round(sec)} s`;  col = '#6ee7b7'; }
  else if(sec < 3600) { label = `~${Math.round(sec/60)} min`; col = sec<300?'var(--amber)':'#f87171'; }
  else              { label = `~${(sec/3600).toFixed(1)} hr`;  col = '#f87171'; }
  return {
    gridCells, steps, totalUpdates, sec, label, col, np,
    detail: `${(gridCells/1e6).toFixed(2)}M grid cells × ${steps} time steps${np>1?` ÷ ${np} cores`:''}`
  };
}

// ─── DECAY POINT SUGGESTION ──────────────────────────────────────────────
// Returns {px, py, pz, source, label} — best guess for decay monitor point
function decaySuggest() {
  const src0 = S.sources[0];
  const dir = src0 ? (src0.srcDir || '+X') : '+X';
  const dirAxis = dir.replace(/[+-]/,'').toLowerCase(); // 'x','y','z'
  const dirSign = dir[0]==='-' ? -1 : 1;

  // Option 1: use a transmission monitor center if one exists
  const tranMon = S.monitors.find(m => m.role==='tran') || S.monitors.find(m => m.type==='transmission');
  if(tranMon) {
    return {
      px: tranMon.cx||0, py: tranMon.cy||0, pz: tranMon.cz||0,
      source: 'transmission monitor center',
      label: `(${tranMon.cx||0}, ${tranMon.cy||0}, ${tranMon.cz||0})`
    };
  }

  // Option 2: place along propagation direction, just inside cell before PML
  const halfX = S.cell.sx/2, halfY = S.cell.sy/2, halfZ = (S.cell.sz||0)/2;
  const pmlT = dirAxis==='x' ? (S.bc.pmlX||1) : dirAxis==='y' ? (S.bc.pmlY||1) : (S.bc.pmlZ||1);
  const half = dirAxis==='x' ? halfX : dirAxis==='y' ? halfY : halfZ;
  const sugPos = parseFloat(((half - pmlT - 0.5) * dirSign).toFixed(2));
  const px = dirAxis==='x' ? sugPos : (src0 ? src0.cx||0 : 0);
  const py = dirAxis==='y' ? sugPos : (src0 ? src0.cy||0 : 0);
  const pz = dirAxis==='z' ? sugPos : 0;
  return {
    px, py, pz,
    source: `${dir} propagation, just inside cell`,
    label: `(${px}, ${py}, ${pz})`
  };
}

// ─── VALIDATION ENGINE ────────────────────────────────────────────────────
// Returns array of {level:'error'|'warn', code, msg, detail, stage}
function getWarnings() {
  const W = [];
  const src0 = S.sources[0];
  const fmax  = src0 ? (src0.fmax  || src0.fcen || 0.5)  : 0.5;
  const res   = S.cell.res || 10;

  // ── W1: Resolution adequacy ─────────────────────────────────────────────
  // Need ≥8 pts/wavelength inside highest-index material
  // Collect all material indices from geo + layers + background
  const MAT_N = {air:1, silicon:3.46, sio2:1.44, ito:1.93, gold:0.18, aluminum:0.82, organic:1.73, platinum:0.41, custom:Math.sqrt(S.mats.customEps||1)};
  let nMax = MAT_N[S.mats.bg] || 1;
  S.geo.forEach(g => { const n = MAT_N[g.mat] || Math.sqrt(g.eps||1); if(n>nMax) nMax=n; });
  S.layers.forEach(l => { const n = MAT_N[l.mat] || 1; if(n>nMax) nMax=n; });
  // Also check dispersive materials — use rough n from first pole if available
  (S.mats.dispMats||[]).forEach(d => { if(d.eps_inf) { const n=Math.sqrt(d.eps_inf||1); if(n>nMax) nMax=n; } });
  const minRes = Math.ceil(8 * nMax * fmax);
  if(res < minRes) {
    W.push({level:'error', code:'W1', stage:[0,6],
      msg:`Resolution too low`,
      detail:`res=${res} but need ≥ ${minRes} (8 × n_max=${nMax.toFixed(2)} × f_max=${fmax}) — results will be inaccurate`});
  } else if(res < minRes * 1.5) {
    W.push({level:'warn', code:'W1', stage:[0,6],
      msg:`Resolution marginal`,
      detail:`res=${res}, minimum is ${minRes} — consider increasing for better accuracy`});
  }

  // ── W2: PML thickness vs wavelength ─────────────────────────────────────
  // PML should be ≥ 0.5 / fmin (half wavelength at lowest frequency)
  const fmin = src0 ? (src0.fmin || src0.fcen || 0.1) : 0.1;
  const minPml = 0.5 / fmin;
  const axes = S.cell.dim==='2D' ? ['X','Y'] : ['X','Y','Z'];
  axes.forEach(ax => {
    if((S.bc[ax.toLowerCase()]||'pml') === 'pml') {
      const t = S.bc[`pml${ax}`] || 1.0;
      if(t < minPml * 0.6) {
        W.push({level:'error', code:'W2', stage:[4,6],
          msg:`PML ${ax} too thin`,
          detail:`thickness=${t} but λ_max/2 = ${minPml.toFixed(2)} (f_min=${fmin}) — reflections likely`});
      } else if(t < minPml) {
        W.push({level:'warn', code:'W2', stage:[4,6],
          msg:`PML ${ax} may be thin`,
          detail:`thickness=${t}, recommended ≥ ${minPml.toFixed(2)} (λ/2 at f_min=${fmin})`});
      }
    }
  });

  // ── W3: Source inside PML ────────────────────────────────────────────────
  S.sources.forEach((s,i) => {
    const cx=s.cx||0, cy=s.cy||0, cz=s.cz||0;
    const halfX=S.cell.sx/2, halfY=S.cell.sy/2, halfZ=(S.cell.sz||0)/2;
    const checks = [
      {ax:'X', bc:S.bc.x, t:S.bc.pmlX||1, pos:cx, half:halfX},
      {ax:'Y', bc:S.bc.y, t:S.bc.pmlY||1, pos:cy, half:halfY},
      ...(S.cell.dim==='3D'?[{ax:'Z', bc:S.bc.z, t:S.bc.pmlZ||1, pos:cz, half:halfZ}]:[])
    ];
    checks.forEach(({ax,bc,t,pos,half}) => {
      if(bc!=='pml') return;
      if(Math.abs(pos) > half - t) {
        W.push({level:'error', code:'W3', stage:[3,6],
          msg:`Source ${i+1} inside PML (${ax})`,
          detail:`center ${ax.toLowerCase()}=${pos.toFixed(2)}, PML occupies |${ax.toLowerCase()}| > ${(half-t).toFixed(2)} — move source inward`});
      }
    });
  });

  // ── W4: Monitor inside PML ───────────────────────────────────────────────
  S.monitors.forEach((m,i) => {
    const cx=m.cx||0, cy=m.cy||0, cz=m.cz||0;
    const halfX=S.cell.sx/2, halfY=S.cell.sy/2, halfZ=(S.cell.sz||0)/2;
    const checks = [
      {ax:'X', bc:S.bc.x, t:S.bc.pmlX||1, pos:cx, half:halfX},
      {ax:'Y', bc:S.bc.y, t:S.bc.pmlY||1, pos:cy, half:halfY},
      ...(S.cell.dim==='3D'?[{ax:'Z', bc:S.bc.z, t:S.bc.pmlZ||1, pos:cz, half:halfZ}]:[])
    ];
    checks.forEach(({ax,bc,t,pos,half}) => {
      if(bc!=='pml') return;
      if(Math.abs(pos) > half - t) {
        W.push({level:'error', code:'W4', stage:[5,6],
          msg:`Monitor ${i+1} inside PML (${ax})`,
          detail:`center ${ax.toLowerCase()}=${pos.toFixed(2)}, PML occupies |${ax.toLowerCase()}| > ${(half-t).toFixed(2)} — move monitor inward`});
      }
    });
  });

  // ── W5: ContinuousSource + flux monitors ────────────────────────────────
  const hasContinuous = S.sources.some(s => s.type==='ContinuousSource');
  const hasFluxMons   = S.monitors.some(m => m.type!=='nearfar');
  if(hasContinuous && hasFluxMons) {
    W.push({level:'error', code:'W5', stage:[3,5,6],
      msg:`ContinuousSource + flux monitors`,
      detail:`ContinuousSource is single-frequency — add_flux gives incorrect broadband spectra. Use GaussianSource for frequency-resolved flux.`});
  }
  // Also warn if ContinuousSource used in T/R or scatter mode
  if(hasContinuous && (S.run.trMode || S.run.scatterMode)) {
    W.push({level:'error', code:'W5b', stage:[3,6],
      msg:`ContinuousSource in two-run mode`,
      detail:`T/R/Loss and Scattering modes require a broadband GaussianSource. ContinuousSource will give wrong normalization.`});
  }

  // ── W6: Decay point at origin in T/R mode ───────────────────────────────
  if(S.run.trMode && (S.run.trStopMode||'decay')==='decay') {
    const px=S.run.trDecayPx||0, py=S.run.trDecayPy||0, pz=S.run.trDecayPz||0;
    if(px===0 && py===0 && pz===0) {
      const sug = decaySuggest();
      W.push({level:'warn', code:'W6', stage:[6],
        msg:`Decay point at origin`,
        detail:`(0,0,0) is often inside or behind the structure — suggested: ${sug.label} (${sug.source})`});
    }
  }

  // ── W7: k_point enabled + GaussianSource planewave but is_integrated=False ─
  if(S.bc.kpointEnabled) {
    S.sources.forEach((s,i) => {
      if(s.type !== 'GaussianSource') return;
      // Is it a planewave? — spans full cell on at least one transverse axis
      const szx=s.szx||0, szy=s.szy||0, szz=s.szz||0;
      const isPlane = s.srcPlane!=='none' || szx>=S.cell.sx*0.8 || szy>=S.cell.sy*0.8 || (S.cell.dim==='3D'&&szz>=S.cell.sz*0.8);
      if(isPlane && !s.isIntegrated) {
        W.push({level:'error', code:'W7', stage:[3,4],
          msg:`Source ${i+1}: is_integrated missing`,
          detail:`k_point is enabled and source spans full cell — GaussianSource needs is_integrated=True for correct planewave normalization`});
      }
    });
  }
  // Also warn if is_integrated=True but k_point is not enabled
  S.sources.forEach((s,i) => {
    if(s.type==='GaussianSource' && s.isIntegrated && !S.bc.kpointEnabled) {
      W.push({level:'warn', code:'W7b', stage:[3,4],
        msg:`Source ${i+1}: is_integrated=True but no k_point`,
        detail:`is_integrated=True requires k_point to be set in Boundaries — enable k_point (can be 0,0,0 for Γ point)`});
    }
  });

  // ── W8: FluxRegion direction conflict ────────────────────────────────────
  S.monitors.forEach((m,i) => {
    const msx=m.msx||0, msy=m.msy||0, msz=m.msz||0;
    const dir = m.dir || 'auto';
    if(dir === 'auto') return; // auto is always safe
    // Infer correct normal from zero-size axis
    const zeroAxes = [];
    if(msx===0) zeroAxes.push('X');
    if(msy===0) zeroAxes.push('Y');
    if(msz===0) zeroAxes.push('Z');
    // For a plane monitor, exactly one axis should be zero → that's the normal
    if(zeroAxes.length===1 && dir!==zeroAxes[0]) {
      W.push({level:'warn', code:'W8', stage:[5],
        msg:`Monitor ${i+1}: direction may be wrong`,
        detail:`Size suggests ${zeroAxes[0]}-normal plane (${zeroAxes[0]}=0) but direction=${dir} — MEEP will use direction=${dir}, which may give wrong flux sign or zero reading`});
    }
    // Point monitor with direction set — probably mistake
    if(msx===0 && msy===0 && msz===0 && dir!=='auto') {
      W.push({level:'warn', code:'W8b', stage:[5],
        msg:`Monitor ${i+1}: point monitor with explicit direction`,
        detail:`All sizes are 0 — this is a point monitor. Direction has no meaning for a point. Set to 'auto' or add size.`});
    }
  });

  // ── W9: Geometry outside cell or inside PML ─────────────────────────────
  // Returns half-extents {dx,dy,dz} of a geo object from its center
  function geoHalfExtents(g) {
    // Helper: axis-aligned bounding box half-extents of a rotated rectangle in 2D
    function rotatedRectAABB(wx, wy, rotDeg) {
      const θ = (rotDeg||0)*Math.PI/180;
      const c=Math.abs(Math.cos(θ)), s=Math.abs(Math.sin(θ));
      return {dx: (wx*c + wy*s)/2, dy: (wx*s + wy*c)/2};
    }
    // Helper: AABB of rotated polygon vertices
    function rotatedPolyAABB(verts, sc, rotDeg) {
      const θ = (rotDeg||0)*Math.PI/180;
      const cosT=Math.cos(θ), sinT=Math.sin(θ);
      let maxX=0, maxY=0;
      verts.forEach(([vx,vy])=>{
        const rx=Math.abs(vx*cosT - vy*sinT)*sc;
        const ry=Math.abs(vx*sinT + vy*cosT)*sc;
        if(rx>maxX) maxX=rx; if(ry>maxY) maxY=ry;
      });
      return {dx: maxX, dy: maxY};
    }
    switch(g.type) {
      case 'Rectangle': {
        if(g.wx_inf || g.wy_inf) return null; // mp.inf — skip bounds check
        const bb = rotatedRectAABB(g.wx||2, g.wy||1, g.rot||0);
        return {dx: bb.dx, dy: bb.dy, dz: 0};
      }
      case 'Square': {
        if(g.wx_inf) return null;
        const bb = rotatedRectAABB(g.wx||1, g.wx||1, g.rot||0);
        return {dx: bb.dx, dy: bb.dy, dz: 0};
      }
      case 'Circle':
        return {dx: g.r, dy: g.r, dz: 0};
      case 'Triangle': {
        const bb = rotatedPolyAABB(PRISM_PRESETS.triangle, g.scale||1, g.rot||0);
        return {dx: bb.dx, dy: bb.dy, dz: 0};
      }
      case 'Hexagon': {
        const bb = rotatedPolyAABB(PRISM_PRESETS.hexagon, g.scale||0.6, g.rot||0);
        return {dx: bb.dx, dy: bb.dy, dz: 0};
      }
      case 'Polygon': {
        const verts = g.polyVerts || [[0,0.5],[0.5,-0.5],[-0.5,-0.5]];
        const bb = rotatedPolyAABB(verts, g.scale||1, g.rot||0);
        return {dx: bb.dx, dy: bb.dy, dz: 0};
      }
      case 'Block': {
        // Block rotates around Y — AABB in XZ plane changes, Y unaffected
        if(g.wx_inf || g.wy_inf || g.wz_inf) return null; // mp.inf — skip bounds check
        const θ = (g.rot||0)*Math.PI/180;
        const c=Math.abs(Math.cos(θ)), s=Math.abs(Math.sin(θ));
        const wx=g.wx||1, wz=(g.wz||1);
        return {dx: (wx*c + wz*s)/2, dy: (g.wy||1)/2, dz: (wx*s + wz*c)/2};
      }
      case 'Sphere':
        return {dx: g.r, dy: g.r, dz: g.r};
      case 'Cylinder': case 'Cone':
        return {dx: g.r, dy: g.h/2, dz: g.r};
      case 'Pyramid':
        return {dx: (g.wx||1)/2, dy: g.h/2, dz: (g.wz||g.wx||1)/2};
      default:
        return {dx: 1, dy: 1, dz: 1};
    }
  }

  const halfX = S.cell.sx/2, halfY = S.cell.sy/2, halfZ = (S.cell.sz||0)/2;
  const pmlX = (S.bc.x||'pml')==='pml' ? (S.bc.pmlX||1) : 0;
  const pmlY = (S.bc.y||'pml')==='pml' ? (S.bc.pmlY||1) : 0;
  const pmlZ = S.cell.dim==='3D' && (S.bc.z||'pml')==='pml' ? (S.bc.pmlZ||1) : 0;

  S.geo.forEach((g,i) => {
    const ext = geoHalfExtents(g);
    if(!ext) return; // mp.inf on some axis — skip bounds check
    const cx = g.cx||0, cy = g.cy||0, cz = g.cz||0;
    const checks = [
      {ax:'X', lo: cx-ext.dx, hi: cx+ext.dx, half: halfX, pml: pmlX},
      {ax:'Y', lo: cy-ext.dy, hi: cy+ext.dy, half: halfY, pml: pmlY},
      ...(S.cell.dim==='3D' && ext.dz>0 ? [{ax:'Z', lo: cz-ext.dz, hi: cz+ext.dz, half: halfZ, pml: pmlZ}] : [])
    ];
    checks.forEach(({ax, lo, hi, half, pml}) => {
      if(half <= 0) return;
      if(lo < -half || hi > half) {
        W.push({level:'error', code:'W9', stage:[1,6],
          msg:`Object ${i+1} (${g.type}) outside cell boundary (${ax})`,
          detail:`extends to [${lo.toFixed(2)}, ${hi.toFixed(2)}] but cell ${ax} boundary is ±${half} — MEEP will silently clip`});
      } else if(pml > 0 && (lo < -(half-pml) || hi > (half-pml))) {
        W.push({level:'warn', code:'W9', stage:[1,6],
          msg:`Object ${i+1} (${g.type}) extends into PML (${ax})`,
          detail:`extends to [${lo.toFixed(2)}, ${hi.toFixed(2)}], PML starts at ±${(half-pml).toFixed(2)} — object partially inside absorbing region`});
      }
    });
  });

  // Also check layer stack total thickness vs cell dimension
  if(S.layers.length > 0) {
    const stackAxis = S.layers_stackAxis || 'Y';
    const totalT = S.layers.reduce((s,l) => s+(l.t||0), 0);
    const halfStack = stackAxis==='X' ? halfX : stackAxis==='Y' ? halfY : halfZ;
    if(halfStack > 0 && totalT > S.cell[`s${stackAxis.toLowerCase()}`]) {
      W.push({level:'warn', code:'W9b', stage:[1,6],
        msg:`Layer stack too tall for cell`,
        detail:`total layer thickness=${totalT.toFixed(2)} exceeds cell ${stackAxis}=${S.cell[`s${stackAxis.toLowerCase()}`]} — layers will overlap cell boundary`});
    }
  }

  return W;
}

// Render warning banners for a given set of stage indices
function warnBanner(stageNums) {
  const ws = getWarnings().filter(w => w.stage.some(s => stageNums.includes(s)));
  if(!ws.length) return '';
  const rows = ws.map(w => {
    const isErr = w.level==='error';
    const bg    = isErr ? 'rgba(239,68,68,.08)'    : 'rgba(245,158,11,.07)';
    const border= isErr ? 'rgba(239,68,68,.35)'    : 'rgba(245,158,11,.3)';
    const col   = isErr ? '#f87171'                : 'var(--amber)';
    const icon  = isErr ? '🔴' : '⚠';
    return `<div style="background:${bg};border-left:3px solid ${col};border-radius:0 5px 5px 0;padding:7px 12px;margin-bottom:4px;font-size:11px;line-height:1.6">
      <span style="color:${col};font-weight:700">${icon} ${w.msg}</span>
      <span style="color:var(--dim);margin-left:8px">${w.detail}</span>
    </div>`;
  }).join('');
  return `<div style="border:1px solid rgba(239,68,68,.2);border-radius:7px;overflow:hidden;margin-bottom:12px">${rows}</div>`;
}

function updateScript(){
  const L=[];

  // ── Helper: build FluxRegion string for a monitor object ─────────────────
  function fluxRegionStr(m) {
    const msx=m.msx||0, msy=m.msy||0, msz=m.msz||0;
    const dirMap = {X:'mp.X', Y:'mp.Y', Z:'mp.Z'};
    const dirVal = (m.dir && m.dir!=='auto') ? dirMap[m.dir] : null;
    const weightVal = (m.weight !== undefined && m.weight !== 1) ? m.weight : null;
    let extra = '';
    if(dirVal)    extra += `, direction=${dirVal}`;
    if(weightVal) extra += `, weight=${weightVal}`;
    return `mp.FluxRegion(center=mp.Vector3(${m.cx||0}, ${m.cy||0}, ${m.cz||0}), size=mp.Vector3(${msx}, ${msy}, ${msz})${extra})`;
  }

  L.push(`import os`);
  L.push(`os.environ['MPLBACKEND'] = 'Agg'  # must be set before importing meep or matplotlib`);
  L.push(`import meep as mp`);
  L.push(`import numpy as np`);
  L.push(`import random, math`);
  L.push(`import matplotlib`);
  L.push(`matplotlib.use('Agg')`);
  L.push(`import matplotlib.pyplot as plt`);
  L.push(``);
  // ── Custom dispersive materials ───────────────────────
  if((S.mats?.dispMats||[]).length){
    L.push(`# ── Custom Dispersive Materials ────────────`);
    (S.mats.dispMats||[]).forEach(d=>{
      const vn = d.varName||('mat_'+d.id);
      const suscs=d.suscs.map(s=>{
        if(s.type==='Drude')      return`mp.DrudeSusceptibility(frequency=${s.frq}, gamma=${s.gam}, sigma=${s.sig})`;
        if(s.type==='Lorentzian') return`mp.LorentzianSusceptibility(frequency=${s.frq}, gamma=${s.gam}, sigma=${s.sig})`;
        return null;
      }).filter(Boolean);
      let parts=[`epsilon=${d.epsInf||1}`];
      if(d.dCond&&d.dCond!==0) parts.push(`D_conductivity=${d.dCond}`);
      if(suscs.length===0){
        L.push(`${vn} = mp.Medium(${parts.join(', ')})`);
      } else {
        L.push(`${vn} = mp.Medium(`);
        parts.forEach(p=>L.push(`    ${p},`));
        L.push(`    E_susceptibilities=[`);
        suscs.forEach(s=>L.push(`        ${s},`));
        L.push(`    ]`);
        L.push(`)`);
      }
    });
    L.push(``);
  }
  L.push(`# ── Cell ──────────────────────────────`);
  if(S.cell.dim==='2D'){
    L.push(`cell = mp.Vector3(${S.cell.sx}, ${S.cell.sy})`);
  } else {
    L.push(`cell = mp.Vector3(${S.cell.sx}, ${S.cell.sy}, ${S.cell.sz})`);
  }
  L.push(`resolution = ${S.cell.res}`);L.push(``);
  L.push(`# ── Geometry ──────────────────────────`);
  L.push(`geometry = [`);
  // In T/R mode: geometry list = Run 2 objects (both + run2). Run 1 only objects excluded.
  const geoList = S.run.trMode
    ? S.geo.filter(g => ['both','run2'].includes((S.run.trGeoRun||{})[g.id]||'both'))
    : S.geo;
  geoList.forEach(g=>{
    // Map 2D UI types to MEEP types
    const meepType = SHAPE2D_MEEP[g.type] || g.type;
    if(meepType==='Block'||g.type==='Rectangle'||g.type==='Square'){
      const wx = g.wx_inf ? 'mp.inf' : (g.type==='Square'?g.wx:g.wx);
      const wy = g.wy_inf ? 'mp.inf' : (g.type==='Square'?g.wx:g.wy);
      const wz = S.cell.dim==='2D' ? 'mp.inf' : (g.wz_inf ? 'mp.inf' : (g.wz||'mp.inf'));
      const rot = g.rot||0;
      L.push(`    mp.Block(`);
      L.push(`        size=mp.Vector3(${wx}, ${wy}, ${wz}),`);
      L.push(`        center=mp.Vector3(${g.cx}, ${g.cy}, ${g.cz||0}),`);
      if(rot !== 0){
        const θ = rot*Math.PI/180;
        const c=Math.cos(θ).toFixed(6), s=Math.sin(θ).toFixed(6);
        const mc=Math.cos(-θ).toFixed(6), ms=Math.sin(-θ).toFixed(6);
        L.push(`        e1=mp.Vector3(${c}, ${s}, 0),`);
        L.push(`        e2=mp.Vector3(${mc}, ${ms}, 0),`);
      }
      L.push(`        material=${matStr(g.mat,g.eps)}`);
      L.push(`    ),`);
    } else if(meepType==='Cylinder'||g.type==='Circle'){
      const axVec = axisVec(g.axis);
      if(!axVec) L.push(`    # ⚠ Cylinder #${g.id}: axis not set — defaulting to +Z. Set axis in Stage 2.`);
      L.push(`    mp.Cylinder(`);
      L.push(`        radius=${g.r}, height=${S.cell.dim==='2D'?'mp.inf':g.h||'mp.inf'},`);
      if(axVec) L.push(`        axis=${axVec},`);
      else      L.push(`        axis=mp.Vector3(0,0,1),  # default +Z`);
      L.push(`        center=mp.Vector3(${g.cx}, ${g.cy}, ${g.cz||0}),`);
      L.push(`        material=${matStr(g.mat,g.eps)}`);
      L.push(`    ),`);
    } else if(g.type==='Cone'){
      const r2 = g.r2!==undefined ? g.r2 : 0;
      const axVec = axisVec(g.axis);
      if(!axVec) L.push(`    # ⚠ Cone #${g.id}: axis not set — defaulting to +Z. Set axis in Stage 2.`);
      L.push(`    mp.Cone(`);
      L.push(`        radius=${r2},   # tip radius`);
      L.push(`        radius2=${g.r||0.5},  # base radius`);
      L.push(`        height=${g.h||1},`);
      if(axVec) L.push(`        axis=${axVec},`);
      else      L.push(`        axis=mp.Vector3(0,0,1),  # default +Z`);
      L.push(`        center=mp.Vector3(${g.cx}, ${g.cy}, ${g.cz||0}),`);
      L.push(`        material=${matStr(g.mat,g.eps)}`);
      L.push(`    ),`);
    } else if(g.type==='Pyramid'){
      const equivR = Math.max(g.wx||1, g.wz||1) * 0.5;
      const axVec = axisVec(g.axis);
      if(!axVec) L.push(`    # ⚠ Pyramid #${g.id}: axis not set — defaulting to +Z. Set axis in Stage 2.`);
      L.push(`    # Pyramid (base ${g.wx||1}×${g.wz||1}, h=${g.h||1}) — approximated as mp.Cone`);
      L.push(`    mp.Cone(`);
      L.push(`        radius=0, radius2=${equivR.toFixed(4)},`);
      L.push(`        height=${g.h||1},`);
      if(axVec) L.push(`        axis=${axVec},`);
      else      L.push(`        axis=mp.Vector3(0,0,1),  # default +Z`);
      L.push(`        center=mp.Vector3(${g.cx}, ${g.cy}, ${g.cz||0}),`);
      L.push(`        material=${matStr(g.mat,g.eps)}`);
      L.push(`    ),`);
    } else if(g.type==='Sphere'){
      L.push(`    mp.Sphere(`);L.push(`        radius=${g.r},`);
      L.push(`        center=mp.Vector3(${g.cx}, ${g.cy}, ${g.cz||0}),`);
      L.push(`        material=${matStr(g.mat,g.eps)}`);L.push(`    ),`);
    } else if(meepType==='Prism'||g.type==='Triangle'||g.type==='Hexagon'||g.type==='Polygon'){
      let verts;
      if(g.type==='Polygon') verts = (g.polyVerts||[[0,0.5],[0.5,-0.5],[-0.5,-0.5]]);
      else { const preset=g.type==='Triangle'?'triangle':g.type==='Hexagon'?'hexagon':(g.preset||'triangle'); verts=PRISM_PRESETS[preset]; }
      const sc=g.scale||1;
      // Apply rotation to vertices
      const rot = g.rot||0;
      const θ = rot*Math.PI/180;
      const cosT=Math.cos(θ), sinT=Math.sin(θ);
      const rotVert = ([vx,vy]) => [vx*cosT - vy*sinT, vx*sinT + vy*cosT];
      L.push(`    mp.Prism(`);
      L.push(`        vertices=[`);
      verts.forEach(v=>{
        const [rx,ry]=rotVert([v[0]*sc, v[1]*sc]);
        L.push(`            mp.Vector3(${(rx+g.cx).toFixed(4)}, ${(ry+g.cy).toFixed(4)}),`);
      });
      L.push(`        ],`);
      L.push(`        height=${S.cell.dim==='2D'?'mp.inf':g.h||1},`);
      L.push(`        material=${matStr(g.mat,g.eps)}`);L.push(`    ),`);
    }
  });
  if(S.layers.length>0){
    const sa = S.layers_stackAxis || 'Y';
    L.push(`    # Layer stack (stacked along ${sa} axis)`);
    let lpos = sa==='X' ? -S.cell.sx/2 : sa==='Y' ? -S.cell.sy/2 : -S.cell.sz/2;
    S.layers.forEach(l=>{
      const cpos = (lpos + l.t/2).toFixed(3);
      // size: inf on the two non-stacking axes, l.t on the stacking axis
      const sizeStr = sa==='X' ? `mp.Vector3(${l.t}, mp.inf, mp.inf)`
                    : sa==='Y' ? `mp.Vector3(mp.inf, ${l.t}, mp.inf)`
                    :            `mp.Vector3(mp.inf, mp.inf, ${l.t})`;
      // center: only the stacking axis has a non-zero value
      const cxStr = sa==='X' ? cpos : '0';
      const cyStr = sa==='Y' ? cpos : '0';
      const czStr = sa==='Z' ? cpos : '0';
      const centerStr = S.cell.dim==='3D'
        ? `mp.Vector3(${cxStr}, ${cyStr}, ${czStr})`
        : `mp.Vector3(${cxStr}, ${cyStr})`;
      L.push(`    mp.Block(size=${sizeStr},`);
      L.push(`             center=${centerStr},`);
      L.push(`             material=${matStr(l.mat)}),`);
      lpos += l.t;
    });
  }
  L.push(`]`);
  // Periodic arrays — one block per entry in S.perArrays
  S.perArrays.forEach((p,pi)=>{
    const g=getPerGeoForArray(p);
    const nz=S.cell.dim==='3D'?(p.nz||1):1;
    if(g){
      L.push(``);L.push(`# ── Periodic Array ${pi+1} (${g.type}, ${p.nx}×${p.ny}${nz>1?'×'+nz:''}) ─`);
      L.push(`for ix in range(${p.nx}):`);
      L.push(`    for iy in range(${p.ny}):`);

      let bestIdx = 0;

      S.monitors.forEach((m, i) => {

        // downstream = most positive for +X beam, most negative for -X beam
        if(bestVal === null || (bSign > 0 ? cVal > bestVal : cVal < bestVal)) {
          bestVal = cVal; bestIdx = i;

      });
      incidentMonIdx = bestIdx;
      const im = S.monitors[bestIdx];
      // Face area = product of the two non-zero size dims
      if(is2D) {

        incidentFaceArea = (d1 && d2) ? d1*d2 : 1.0;
        incidentFaceAreaExpr = (d1 && d2) ? `${d1} * ${d2}` : '1.0  # ⚠ check monitor size';
        incidentFaceComment = `# area of downstream face (mon_${bestIdx}): `
          + (bAx==='x' ? `sy=${d1} × sz=${d2}` : bAx==='y' ? `sx=${d1} × sz=${d2}` : `sx=${d1} × sy=${d2}`);

    if(S.monitors.length){

      const fluxTerms = S.monitors.map((_,i)=>(i%2===0?'':'-')+`flux_${i}`).join(' + ').replace(/\+ -/g,'- ');
      L.push(`# ── Scattering cross section & efficiency ────────────────────`);

      // Normalize by source-facing monitor face area (physically: incident power / beam cross-section)
      L.push(`# Incident ${is2D?'power per unit length':'intensity'} = flux through source-facing face / face ${is2D?'length':'area'}`);
      L.push(`incident_face_${is2D?'len ':'area'} = ${incidentFaceAreaExpr}  ${incidentFaceComment}`);
      L.push(`intensity        = incident_flux / incident_face_${is2D?'len':'area'}`);
      L.push(`scatt_cross_sec  = np.divide(scatt_flux, intensity)`);
      L.push(`${geoVarName}${' '.repeat(Math.max(1,17-geoVarName.length))}= ${geoArea}${geoAreaComment}`);
      L.push(`scatt_eff_meep   = scatt_cross_sec / ${geoVarName}`);
      L.push(``);
      // Geometry-aware characteristic perimeter — computed here so char_length Python var

      L.push(`print(f"Positive values:  {(scatt_eff_meep > 0).sum()} / {len(scatt_eff_meep)}")`);
      L.push(``);

        L.push(`        for f in freqs`);

        L.push(`    print("PyMieScatt: theory comparison enabled ✓")`);
        L.push(`except Exception as e:`);

        L.push(`    print(f"Theory comparison skipped: {e}")`);
        L.push(``);
      } else {
        L.push(`has_theory = False  # PyMieScatt analytic comparison only available for Sphere`);
        L.push(``);
      }
      L.push(`# ── Plot ──────────────────────────────────────────────────────`);
      L.push(`size_param = char_length * freqs  # P/λ`);
      L.push(``);
      L.push(`# Clip to valid frequency range`);
      L.push(`_x1, _x2 = char_length * fmin, char_length * fmax`);
      L.push(`_mask = (size_param >= _x1) & (size_param <= _x2) & (scatt_eff_meep > 0)`);
      L.push(`_ydata = scatt_eff_meep[_mask]`);

      L.push(`    _ydata = np.concatenate([_ydata, scatt_eff_theory[_mask]])`);
      L.push(`_ymin = _ydata.min() * 0.5 if len(_ydata) > 0 else 1e-3`);

  } else if(S.run.trMode) {

            L.push(`    mp.Block(size=mp.Vector3(${wx},${wy},${wz}),center=mp.Vector3(${g.cx},${g.cy},${g.cz||0})${e1e2},material=${matStr(g.mat,g.eps)}),`);

            const sc=g.scale||1,rot=g.rot||0,θ=rot*Math.PI/180,cosT=Math.cos(θ),sinT=Math.sin(θ);

      }
    }
    L.push(`sim.run(until_after_sources=${stopCond()})`);
    L.push(``);

    // ── Collect & compute ────────────────────────────────────────
    if(S.monitors.length) {
      L.push(`# ── Collect fluxes ──────────────────────────────────────────`);
      reflList.forEach(r => L.push(`${r.pyVar}_flux = np.array(mp.get_fluxes(mon_${r.idx}))`));
      tranList.forEach(t => {
        L.push(`${t.fluxVar} = np.array(mp.get_fluxes(mon_${t.idx}))  # [${t.pyVar}]`);
      });
      L.push(``);

      // display_fluxes — raw CSV to stdout
      if(S.run.outDisplayFlux) {
        const allMons = S.monitors.map((_,i)=>`mon_${i}`).join(', ');
        L.push(`# ── Raw flux data (CSV to stdout) ───────────────────────────`);
        L.push(`sim.display_fluxes(${allMons})`);
        L.push(``);
      }
      L.push(`# ── Compute T / R / Loss ─────────────────────────────────────`);
      tranList.forEach(t => {
        L.push(`${t.pyVar} = ${t.fluxVar} / incident_flux`);
      });
      reflList.forEach(r => L.push(`${r.pyVar} = -${r.pyVar}_flux / incident_flux  # negative: flux convention`));
      // Loss = 1 - sum(T) - sum(R)
      if(reflList.length>0 && tranList.length>0) {
        const tSum = tranList.map(t=>t.pyVar).join(' + ');
        const rSum = reflList.map(r=>r.pyVar).join(' + ');
        L.push(`Loss = 1 - (${tSum}) - (${rSum})`);
      }
      L.push(``);

      // Print summary
      L.push(`if mp.am_master():`);
      L.push(`    print(f"\\nFrequency range: [{flux_freqs.min():.4f}, {flux_freqs.max():.4f}]")`);
      tranList.forEach(t => L.push(`    print(f"${t.pyVar} range: [{${t.pyVar}.min():.4f}, {${t.pyVar}.max():.4f}]")`));
      reflList.forEach(r => L.push(`    print(f"${r.pyVar} range: [{${r.pyVar}.min():.4f}, {${r.pyVar}.max():.4f}]")`));
      if(reflList.length>0 && tranList.length>0) L.push(`    print(f"Loss range: [{Loss.min():.4f}, {Loss.max():.4f}]")`);
      L.push(``);

      // ── Plot ────────────────────────────────────────────────────
      const useWl = (S.run.trPlotX||'wavelength') === 'wavelength';
      const xVar  = useWl ? 'wl' : 'freq_ax';
      const xExpr = useWl ? '1.0 / flux_freqs' : 'flux_freqs';
      const xLbl  = useWl ? 'Wavelength (Meep units)' : 'Frequency (Meep units)';
      // Colour palette for multiple T lines
      const rColors = ['bo-','b^-','bs-','bD-'];
      const yVars = [...tranList.map(t=>t.pyVar), ...reflList.map(r=>r.pyVar), (reflList.length>0&&tranList.length>0)?'Loss':null].filter(Boolean);
      L.push(`# ── Plot ────────────────────────────────────────────────────`);
      L.push(`if mp.am_master():`);
      L.push(`    ${xVar} = ${xExpr}  # ${xLbl}`);
      L.push(`    fig, ax = plt.subplots(figsize=(8, 5), dpi=150)`);
      tranList.forEach((t,i) => L.push(`    ax.plot(${xVar}, ${t.pyVar}, '${['ro-','cs-','m^-','y*-','kD-'][i%5]}', ms=4, lw=1.5, label='T — ${t.label}')`));
      reflList.forEach((r,i) => L.push(`    ax.plot(${xVar}, ${r.pyVar}, '${rColors[i%4]}', ms=4, lw=1.5, label='R — ${r.label}')`));
      if(reflList.length>0 && tranList.length>0) L.push(`    ax.plot(${xVar}, Loss, 'go-', ms=4, lw=1.5, label='Loss')`);
      L.push(`    ax.set_xlim([${xVar}.min(), ${xVar}.max()])`);
      if(yVars.length>0) {
        L.push(`    _yall = np.concatenate([${yVars.join(', ')}])`);
        L.push(`    ax.set_ylim([max(0, _yall.min()-0.05), min(1.1, _yall.max()+0.05)])`);
      }
      L.push(`    ax.set_xlabel('${xLbl}', fontsize=11)`);
      L.push(`    ax.set_ylabel('Power fraction', fontsize=11)`);
      L.push(`    ax.set_title(f'T/R/Loss Spectrum — ${refGeos.length} ref obj${refGeos.length!==1?'s':''}, res={resolution}', fontsize=11)`);
      L.push(`    ax.legend(fontsize=11)`);
      L.push(`    ax.grid(True, alpha=0.4)`);
      L.push(`    fig.tight_layout()`);
      L.push(`    fig.savefig('tr_loss.png', dpi=150, bbox_inches='tight')`);
      L.push(`    plt.close(fig)`);
      L.push(`    print('\\nSaved: tr_loss.png')`);
      L.push(`    print('✅ T/R/Loss simulation complete!')`);
      L.push(`    try:`);
      L.push(`        from IPython.display import Image as IPImage, display`);
      L.push(`        display(IPImage('tr_loss.png'))`);
      L.push(`    except ImportError:`);
      L.push(`        pass`);
      // ── Field visualization inside am_master block ────────────────────────
      if(S.run.outEz || S.run.outEps || S.run.outSlice) {
        L.push(``);
        L.push(`    # ── Field snapshot (post T/R/Loss run 2) ─────────────────`);
        emitFieldViz(L, true);
      }
    }
    L.push(``);
  } else {
    // ── STANDARD SINGLE-RUN MODE ─────────────────────────────────────
    L.push(`# ── Simulation ─────────────────────────`);
    L.push(`sim = mp.Simulation(`);L.push(`    cell_size=cell, geometry=geometry, sources=sources,`);
    L.push(`    boundary_layers=boundary_layers,`);L.push(`    default_material=${matStr(S.mats.bg,S.mats.customEps)},`);
    if(syms.length)L.push(`    symmetries=symmetries,`);
    if(hasKpoint)L.push(`    k_point=k_point,`);
    if(S.cell.dim==='2D')L.push(`    dimensions=2,`);L.push(`    resolution=resolution`);L.push(`)`);L.push(``);
    if(S.monitors.length){
      L.push(`# ── Monitors ───────────────────────────`);
      S.monitors.forEach((m,i)=>{
        const nm=`${m.type}_mon_${i}`;
        const src0=S.sources[0];
        const fmin=src0?src0.fmin||0.1:0.1, fmax=src0?src0.fmax||0.5:0.5, nfreq=src0?src0.nfreq||100:100;
        const region=fluxRegionStr(m);
        if(m.type==='nearfar') L.push(`${nm} = sim.add_near2far(${fmin}, ${fmax}, ${nfreq}, ${region})`);
        else L.push(`${nm} = sim.add_flux(${fmin}, ${fmax}, ${nfreq}, ${region})`);
      });L.push(``);}

    // ── Resolve field component (needed by slice/png/hdf5 setup below) ───────
    const srcComp    = _srcComp;
    const rc         = _rc;
    const isE2       = _isE2;
    const mpComp     = _mpComp;
    const outFn      = _outFn;
    const hdf5Key    = _hdf5Key;
    const fieldCmap  = _fieldCmap;
    const fieldTitle = _fieldTitle;
    const is3D       = _is3D;
    const snapPlane  = _snapPlane;
    const snapPos    = _snapPos;
    const arr_size   = _arr_size;
    const arr_center = _arr_center;

    // x×t slice setup
    if(S.run.outSlice){
      const sliceAxis = S.run.sliceAxis || 'X';
      const cx = S.run.sliceCx||0, cy = S.run.sliceCy||0, cz = S.run.sliceCz||0;
      const sx = S.cell.sx, sy = S.cell.sy, sz = S.cell.sz||2;
      // size: full extent along sweep axis, 0 on others → 1D line
      const sliceSizeStr   = sliceAxis==='X' ? `mp.Vector3(${sx}, 0, 0)`
                           : sliceAxis==='Y' ? `mp.Vector3(0, ${sy}, 0)`
                           :                  `mp.Vector3(0, 0, ${sz})`;
      // center: sweep axis at 0 (midpoint), fix other axes at user values
      const sliceCenterStr = sliceAxis==='X' ? `mp.Vector3(0, ${cy}, ${_is3D?cz:0})`
                           : sliceAxis==='Y' ? `mp.Vector3(${cx}, 0, ${_is3D?cz:0})`
                           :                  `mp.Vector3(${cx}, ${cy}, 0)`;
      L.push(`# ── x×t Slice setup ────────────────────`);
      L.push(`_slice_vals = []`);
      L.push(`def _get_slice(sim):`);
      const sliceCompExpr = isE2
        ? `sim.get_array(center=${sliceCenterStr}, size=${sliceSizeStr}, component=mp.Ex)**2 + sim.get_array(center=${sliceCenterStr}, size=${sliceSizeStr}, component=mp.Ey)**2 + sim.get_array(center=${sliceCenterStr}, size=${sliceSizeStr}, component=mp.Ez)**2`
        : `sim.get_array(center=${sliceCenterStr}, size=${sliceSizeStr}, component=${mpComp})`;
      L.push(`    _slice_vals.append(${sliceCompExpr})`);
      L.push(``);
    }
    const steps=[];
    if(S.run.outPng){
      const pngComp = isE2 ? 'mp.Ez' : mpComp;
      const pngCmap = fieldCmap === 'RdBu' ? 'RdBu' : 'hot';
      // In 3D, add -S flag to select slice plane for output_png
      const pngSliceFlag = _is3D ? (()=>{
        const plane = _snapPlane, pos = _snapPos || 0;
        // h5utils -S flag: "x=0" "y=0" "z=0"
        const axLower = plane==='XY' ? `z=${pos}` : plane==='XZ' ? `y=${pos}` : `x=${pos}`;
        return ` -S ${axLower}`;
      })() : '';
      steps.push(`mp.at_every(${ezInt}, mp.output_png(${pngComp}, "-Zc ${pngCmap}${pngSliceFlag}"))`);
      if(isE2) L.push(`# ⚠ |E|² not natively supported in output_png — using Ez as proxy`);
      if(_is3D) L.push(`# PNG animation: ${_snapPlane} slice at pos=${_snapPos||0} (matches 3D snapshot plane)`);
    }
    if(S.run.outHDF5){
      const hdf5Fn = isE2 ? 'mp.output_efield_z' : outFn;
      steps.push(`mp.to_appended("${hdf5Key}", mp.at_every(${ezInt}, ${hdf5Fn}))`);
      if(isE2) L.push(`# ⚠ |E|² HDF5: outputting Ez component — compute |E|² post-processing`);
    }
    if(S.run.outSlice) steps.push(`mp.at_every(${ezInt}, _get_slice)`);
    const runArg = S.run.useUntilAfter ? `until_after_sources=${S.run.until}` : `until=${S.run.until}`;
    L.push(`sim.run(${steps.join(', ')}${steps.length?', ':''}${runArg})`);L.push(``);

    L.push(`# ── Visualization ──────────────────────`);
    L.push(``);
    emitFieldViz(L, false);
    if(S.run.outFlux && S.monitors.length){
      const fluxMons = S.monitors.filter(m=>m.type!=='nearfar');
      if(fluxMons.length){
        L.push(`# ── Flux Spectrum ───────────────────────`);
        L.push(`plt.figure(figsize=(8,4))`);
        fluxMons.forEach((m,i)=>{
          const nm=`${m.type}_mon_${i}`;
          L.push(`freqs_${i} = np.array(mp.get_flux_freqs(${nm}))`);
          L.push(`flux_${i}  = np.array(mp.get_fluxes(${nm}))`);
          L.push(`wl_${i} = 1.0 / freqs_${i}`);
          L.push(`plt.plot(wl_${i}, flux_${i}, label='${m.type}')`);
        });
        L.push(`plt.xlabel('Wavelength (Meep units)')`);
        L.push(`plt.ylabel('Flux')`);
        L.push(`plt.title('Flux Spectrum')`);
        L.push(`plt.legend()`);
        L.push(`plt.grid(True, alpha=0.3)`);
        L.push(`plt.tight_layout()`);
        L.push(`plt.savefig('flux_spectrum.png', dpi=150, bbox_inches='tight')`);
        L.push(`plt.close()`);
        L.push(`print('Saved: flux_spectrum.png')`);
        L.push(``);
      }
    }
  }

  L.push(`print('✅ Simulation complete! Run the display cell to see results.')`);
  L.push(``);

  L.push(`# ── To display in Colab, run this in a NEW cell: ────────────────`);
  L.push(`# from IPython.display import Image, display`);
  const imgFiles = [];
  if(S.run.scatterMode) {
    imgFiles.push('scattering_efficiency.png');
    if(S.run.outEps) imgFiles.push('dielectric.png');
    if(S.run.outEz)  imgFiles.push(`${_hdf5Key}_field.png`);
    if(S.run.outSlice) imgFiles.push('slice_xt.png');
  } else if(S.run.trMode) {
    imgFiles.push('tr_loss.png');
    if(S.run.outEps) imgFiles.push('dielectric.png');
    if(S.run.outEz)  imgFiles.push(`${_hdf5Key}_field.png`);
    if(S.run.outSlice) imgFiles.push('slice_xt.png');
  } else {
    if(S.run.outEps) imgFiles.push('dielectric.png');
    if(S.run.outEz)  imgFiles.push(`${_hdf5Key}_field.png`);
    if(S.run.outSlice) imgFiles.push('slice_xt.png');
    if(S.run.outFlux && S.monitors.filter(m=>m.type!=='nearfar').length) imgFiles.push('flux_spectrum.png');
  }
  imgFiles.forEach(f=>L.push(`# display(Image('${f}'))`));

  document.getElementById('sout').innerHTML=hl(L.join('\n'));
  updateWarnDots();
}

function hl(c){
  return c.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(import|as|def|return|for|if|else|not|and|or|True|False|None|in|range)\b/g,'<span class="kw">$1</span>')
    .replace(/(mp\.[A-Za-z0-9_]+|plt\.[A-Za-z0-9_]+|np\.[A-Za-z0-9_]+|math\.[A-Za-z0-9_]+|random\.[A-Za-z0-9_]+)/g,'<span class="fn">$1</span>')
    .replace(/(#[^\n]*)/g,'<span class="cm">$1</span>')
    .replace(/\b(\d+\.?\d*)\b/g,'<span class="nm">$1</span>')
    .replace(/'([^']*)'/g,'<span class="st">\'$1\'</span>');
}

function finishModeSelect(dim, plane) {

  updateModeBadge();

function updateModeBadge() {
  const lbl = document.getElementById('modebadge-label');
  const icon = document.getElementById('modebadge-icon');
  if(!lbl) return;
  if(S.cell.dim==='2D') {
    lbl.textContent = `2D · ${S.view2dPlane}`;
    icon.textContent = '📐';
  } else {
    lbl.textContent = '3D';
    icon.textContent = '🧊';
  }
}

// ─── NAV ─────────────────────────────────────────────────────────────────
function go(i){
  cur=i;
  document.querySelectorAll('.stage').forEach((el,idx)=>el.classList.toggle('active',idx===i));
  document.getElementById('plbl').textContent=`Stage ${i+1} of 7`;
  document.getElementById('pfill').style.width=`${((i+1)/7)*100}%`;
  renderStage(i);
  updateWarnDots();
}

function updateWarnDots(){
  if(!document.querySelector('.stage')) return;
  const ws = getWarnings();
  // stage index → highest level
  const stageLevel = {};
  ws.forEach(w => w.stage.forEach(s => {
    if(!stageLevel[s] || w.level==='error') stageLevel[s] = w.level;
  }));
  document.querySelectorAll('.stage').forEach((el,idx)=>{
    // Remove old dot
    const old = el.querySelector('.warn-dot');
    if(old) old.remove();
    if(stageLevel[idx]) {
      const dot = document.createElement('div');
      dot.className = 'warn-dot';
      dot.style.cssText = `width:7px;height:7px;border-radius:50%;background:${stageLevel[idx]==='error'?'#f87171':'var(--amber)'};flex-shrink:0;margin-left:auto`;
      el.appendChild(dot);
    }
  });
}
