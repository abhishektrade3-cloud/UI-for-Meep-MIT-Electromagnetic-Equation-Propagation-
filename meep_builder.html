// In 3D: value = projected area (units²). In 2D: value = projected length (units).
// beamAxis: 'x', 'y', or 'z' — direction beam travels
function computeGeoArea(g, beamAxis) {
  if(!g) return {value:1.0, expr:'1.0', note:'', is2D:false};
  const pi = Math.PI;
  const ax = (beamAxis||'x').toLowerCase().replace(/[+-]/g,'');
  const is2D = S.cell.dim === '2D';

  // ── 2D shapes (infinite in Z, cross-section is a LENGTH) ──────────────────
  if(is2D) {
    // Beam is always in the XY plane in 2D; only X and Y matter
    const beamX = ax === 'x';
    // Helper: projected width of polygon vertices along beam-perpendicular axis
    function polyWidth(verts, sc) {
      // If beam along X, the scatterer width seen = span in Y; if beam along Y = span in X
      const idx = beamX ? 1 : 0;
      const coords = verts.map(v => v[idx] * sc);
      return Math.max(...coords) - Math.min(...coords);
    }

    if(g.type==='Circle') {
      const v = 2*(g.r||0.5);
      return {value:v, expr:`2 × ${g.r||0.5} = ${v.toFixed(4)}`, note:`diameter, beam along ${ax.toUpperCase()}`, is2D:true};
    }
    if(g.type==='Square') {
      const rot = g.rot||0;
      if(rot === 0) {
        const v = g.wx||1;
        return {value:v, expr:`${v.toFixed(4)}`, note:`side length, beam along ${ax.toUpperCase()}`, is2D:true};
      } else {
        const θ = rot*Math.PI/180;
        const w = g.wx||1;
        const v = w*(Math.abs(Math.cos(θ)) + Math.abs(Math.sin(θ)));
        return {value:v, expr:`≈ ${v.toFixed(4)}`, note:`rotated ${rot}° square projected along ${ax.toUpperCase()}`, is2D:true};
      }
    }
    if(g.type==='Rectangle') {
      const rot = g.rot||0;
      if(rot === 0) {
        const v = beamX ? (g.wy||1) : (g.wx||2);
        const dim = beamX ? `wy=${g.wy||1}` : `wx=${g.wx||2}`;
        return {value:v, expr:`${v.toFixed(4)} (${dim})`, note:`beam along ${ax.toUpperCase()}`, is2D:true};
      } else {
        // Rotated rectangle: projected width = |wx·sin θ| + |wy·cos θ| (X-beam) or |wx·cos θ| + |wy·sin θ| (Y-beam)
        const θ = rot*Math.PI/180;
        const wx=g.wx||2, wy=g.wy||1;
        const v = beamX
          ? Math.abs(wx*Math.sin(θ)) + Math.abs(wy*Math.cos(θ))
          : Math.abs(wx*Math.cos(θ)) + Math.abs(wy*Math.sin(θ));
        return {value:v, expr:`≈ ${v.toFixed(4)}`, note:`rotated ${rot}° rect, projected along ${ax.toUpperCase()}`, is2D:true};
      }
    }
    if(g.type==='Triangle') {
      const sc = g.scale||1;
      const rot = g.rot||0; const θ=rot*Math.PI/180;
      const cosT=Math.cos(θ), sinT=Math.sin(θ);
      const verts = PRISM_PRESETS.triangle.map(([vx,vy])=>[vx*cosT-vy*sinT, vx*sinT+vy*cosT]);
      const v = polyWidth(verts, sc);
      return {value:v, expr:`≈ ${v.toFixed(4)}`, note:`projected width${rot?`, rotated ${rot}°`:''}, beam along ${ax.toUpperCase()} — verify manually`, is2D:true};
    }
    if(g.type==='Hexagon') {
      const sc = g.scale||0.6;
      const rot = g.rot||0; const θ=rot*Math.PI/180;
      const cosT=Math.cos(θ), sinT=Math.sin(θ);
      const verts = PRISM_PRESETS.hexagon.map(([vx,vy])=>[vx*cosT-vy*sinT, vx*sinT+vy*cosT]);
      const v = polyWidth(verts, sc);
      return {value:v, expr:`≈ ${v.toFixed(4)}`, note:`projected width${rot?`, rotated ${rot}°`:''}, beam along ${ax.toUpperCase()} — verify manually`, is2D:true};
    }
    if(g.type==='Polygon') {
      const sc = g.scale||1;
      const rot = g.rot||0; const θ=rot*Math.PI/180;
      const cosT=Math.cos(θ), sinT=Math.sin(θ);
      const rawVerts = g.polyVerts||[[0,0.5],[0.5,-0.5],[-0.5,-0.5]];
      const verts = rawVerts.map(([vx,vy])=>[vx*cosT-vy*sinT, vx*sinT+vy*cosT]);
      const v = polyWidth(verts, sc);
      return {value:v, expr:`≈ ${v.toFixed(4)}`, note:`projected width${rot?`, rotated ${rot}°`:''}, beam along ${ax.toUpperCase()} — verify manually`, is2D:true};
    }
    // Fallback for any other 2D shape
    return {value:1.0, expr:'1.0', note:'unknown 2D shape — set manually', is2D:true};
  }

  // ── 3D shapes (cross-section is an AREA) ──────────────────────────────────
  const geoAx = (g.axis||'+Z').replace(/[+-]/g,'').toLowerCase();
  const beamPerp = ax !== geoAx;

  if(g.type==='Sphere') {
    const v = pi*(g.r||0.5)**2;
    return {value:v, expr:`π × ${g.r||0.5}² = ${v.toFixed(4)}`, note:'symmetric — beam direction irrelevant', is2D:false};
  }
  if(g.type==='Cylinder') {
    if(!beamPerp) {
      const v = pi*(g.r||0.5)**2;
      return {value:v, expr:`π × ${g.r||0.5}² = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (end-on)`, is2D:false};
    } else {
      const v = 2*(g.r||0.5)*(g.h||1);
      return {value:v, expr:`2 × ${g.r||0.5} × ${g.h||1} = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (side-on)`, is2D:false};
    }
  }
  if(g.type==='Cone') {
    const rBase=g.r||0.5, rTip=g.r2||0, h=g.h||1;
    if(!beamPerp) {
      const v = pi*rBase**2;
      return {value:v, expr:`π × ${rBase}² = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (end-on, base)`, is2D:false};
    } else {
      const v = (rBase+rTip)*h;
      return {value:v, expr:`(${rBase} + ${rTip}) × ${h} = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (side-on, trapezoid)`, is2D:false};
    }
  }
  if(g.type==='Block') {
    const rot = g.rot||0;
    const wx=g.wx||1, wy=g.wy||1, wz=g.wz||1;
    let v, expr;
    if(rot === 0) {
      if(ax==='x')      { v=wy*wz; expr=`${wy} × ${wz} = ${v.toFixed(4)} (YZ face)`; }
      else if(ax==='y') { v=wx*wz; expr=`${wx} × ${wz} = ${v.toFixed(4)} (XZ face)`; }
      else              { v=wx*wy; expr=`${wx} × ${wy} = ${v.toFixed(4)} (XY face)`; }
    } else {
      // Block rotates around Y axis by θ degrees
      const θ = rot*Math.PI/180;
      const cosT=Math.abs(Math.cos(θ)), sinT=Math.abs(Math.sin(θ));
      // Projected extents after Y-rotation: X' = wx·cos θ + wz·sin θ,  Z' = wx·sin θ + wz·cos θ
      const projX = wx*cosT + wz*sinT;
      const projZ = wx*sinT + wz*cosT;
      if(ax==='x')      { v=wy*projZ; expr=`≈ ${wy} × ${projZ.toFixed(3)} = ${v.toFixed(4)} (YZ face, rot ${rot}°)`; }
      else if(ax==='y') { v=projX*projZ; expr=`≈ ${projX.toFixed(3)} × ${projZ.toFixed(3)} = ${v.toFixed(4)} (XZ face, rot ${rot}°)`; }
      else              { v=projX*wy; expr=`≈ ${projX.toFixed(3)} × ${wy} = ${v.toFixed(4)} (XY face, rot ${rot}°)`; }
    }
    return {value:v, expr, note:`beam along ${ax.toUpperCase()}${rot?`, rotated ${rot}° around Y`:''}`, is2D:false};
  }
  if(g.type==='Pyramid') {
    const wx=g.wx||1, wz=g.wz||wx, h=g.h||1;
    if(!beamPerp) {
      const v = wx*wz;
      return {value:v, expr:`${wx} × ${wz} = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (end-on, base)`, is2D:false};
    } else {
      const bw = ax==='x' ? wz : wx;
      const v = 0.5*bw*h;
      return {value:v, expr:`½ × ${bw} × ${h} = ${v.toFixed(4)}`, note:`beam along ${ax.toUpperCase()} (side-on, triangle)`, is2D:false};
    }
  }
  if(g.type==='Prism') {
    const s=g.scale||1; const v=s*s;
    return {value:v, expr:`≈ ${v.toFixed(4)}`, note:'rough estimate — recommend manual override', is2D:false};
  }
  return {value:1.0, expr:'1.0', note:'unknown shape — set manually', is2D:false};
}

// Returns {value, expr, label, is2D} — characteristic perimeter of visible silhouette.
// In 3D: perimeter of projected outline (beam-direction-aware).
// In 2D: width of projected silhouette (same as L_geo).
// Used for size_param = char_length * freqs on the plot x-axis.
function computeGeoPerimeter(g, beamAxis) {
  if(!g) return {value:1.0, expr:'1.0', label:'characteristic length P', is2D:false};
  const pi = Math.PI;
  const ax = (beamAxis||'x').toLowerCase().replace(/[+-]/g,'');
  const is2D = S.cell.dim === '2D';

  function polyPerimeter(verts, sc) {
    let p = 0;
    for(let i=0;i<verts.length;i++){
      const a=verts[i], b=verts[(i+1)%verts.length];
      p += Math.sqrt((b[0]-a[0])**2+(b[1]-a[1])**2)*sc;
    }
    return p;
  }

  // ── 2D mode ───────────────────────────────────────────────────────────────
  if(is2D) {
    const beamX = ax==='x';
    if(g.type==='Circle')
      return {value:2*(g.r||0.5), expr:`2 * ${g.r||0.5}`, label:`circle diameter 2r`, is2D:true};
    if(g.type==='Square') {
      const rot=g.rot||0;
      if(rot===0) return {value:g.wx||1, expr:`${g.wx||1}`, label:`square side`, is2D:true};
      const θ=rot*Math.PI/180, w=g.wx||1;
      const v=w*(Math.abs(Math.cos(θ))+Math.abs(Math.sin(θ)));
      return {value:v, expr:`${v.toFixed(4)}`, label:`rotated square projected width`, is2D:true};
    }
    if(g.type==='Rectangle') {
      const rot=g.rot||0;
      const wx=g.wx||2, wy=g.wy||1;
      if(rot===0){const v=beamX?wy:wx; return {value:v, expr:`${v}`, label:`rectangle width`, is2D:true};}
      const θ=rot*Math.PI/180;
      const v=beamX ? Math.abs(wx*Math.sin(θ))+Math.abs(wy*Math.cos(θ)) : Math.abs(wx*Math.cos(θ))+Math.abs(wy*Math.sin(θ));
      return {value:v, expr:`${v.toFixed(4)}`, label:`rotated rectangle projected width`, is2D:true};
    }
    const presetKey=g.type==='Polygon'?null:(g.type.toLowerCase());
    const verts=presetKey?PRISM_PRESETS[presetKey]:(g.polyVerts||[[0,0.5],[0.5,-0.5],[-0.5,-0.5]]);
    const sc=g.scale||(g.type==='Hexagon'?0.6:1);
    const v=polyPerimeter(verts,sc);
    return {value:v, expr:`${v.toFixed(4)}`, label:`${g.type.toLowerCase()} perimeter`, is2D:true};
  }

  // ── 3D mode ───────────────────────────────────────────────────────────────
  const geoAx = (g.axis||'+Z').replace(/[+-]/g,'').toLowerCase();
  const beamPerp = ax !== geoAx;

  if(g.type==='Sphere') {
    const v=2*pi*(g.r||0.5);
    return {value:v, expr:`2 * np.pi * ${g.r||0.5}`, label:`sphere circumference 2πr`, is2D:false};
  }
  if(g.type==='Cylinder') {
    const r=g.r||0.5, h=g.h||1;
    if(!beamPerp) {
      return {value:2*pi*r, expr:`2 * np.pi * ${r}`, label:`cylinder circumference 2πr (end-on)`, is2D:false};
    } else {
      const v=2*(2*r+h);
      return {value:v, expr:`2 * (2*${r} + ${h})`, label:`cylinder rect perimeter 2(2r+h) (side-on)`, is2D:false};
    }
  }
  if(g.type==='Cone') {
    const rB=g.r||0.5, rT=g.r2||0, h=g.h||1;
    if(!beamPerp) {
      return {value:2*pi*rB, expr:`2 * np.pi * ${rB}`, label:`cone base circumference 2πr (end-on)`, is2D:false};
    } else {
      const slant=Math.sqrt(h**2+(rB-rT)**2);
      const v=2*rB+2*rT+2*slant;
      return {value:v,
        expr:`2*${rB} + 2*${rT} + 2*np.sqrt(${h}**2 + (${rB}-${rT})**2)`,
        label:`cone trapezoid perimeter (side-on)`, is2D:false};
    }
  }
  if(g.type==='Block') {
    const rot=g.rot||0;
    const wx=g.wx||1, wy=g.wy||1, wz=g.wz||1;
    let d1,d2,fl;
    if(rot===0) {
      if(ax==='x'){d1=wy;d2=wz;fl='YZ face';}
      else if(ax==='y'){d1=wx;d2=wz;fl='XZ face';}
      else{d1=wx;d2=wy;fl='XY face';}
      return {value:2*(d1+d2), expr:`2 * (${d1} + ${d2})`, label:`block rect perimeter (${fl})`, is2D:false};
    } else {
      // Block rotates around Y — projected extents
      const θ=rot*Math.PI/180, c=Math.abs(Math.cos(θ)), s=Math.abs(Math.sin(θ));
      const projX=wx*c+wz*s, projZ=wx*s+wz*c;
      if(ax==='x'){d1=wy;d2=projZ;fl='YZ face (rotated)';}
      else if(ax==='y'){d1=projX;d2=projZ;fl='XZ face (rotated)';}
      else{d1=projX;d2=wy;fl='XY face (rotated)';}
      return {value:2*(d1+d2), expr:`≈ 2 * (${d1.toFixed(3)} + ${d2.toFixed(3)})`, label:`block rect perimeter (${fl})`, is2D:false};
    }
  }
  if(g.type==='Pyramid') {
    const wx=g.wx||1, wz=g.wz||wx, h=g.h||1;
    if(!beamPerp) {
      return {value:2*(wx+wz), expr:`2 * (${wx} + ${wz})`, label:`pyramid base perimeter (end-on)`, is2D:false};
    } else {
      const base=ax==='x'?wz:wx;
      const v=base+2*Math.sqrt(h**2+(base/2)**2);
      return {value:v,
        expr:`${base} + 2*np.sqrt(${h}**2 + (${base}/2)**2)`,
        label:`pyramid triangle perimeter (side-on)`, is2D:false};
    }
  }
  if(g.type==='Prism') {
    const verts=PRISM_PRESETS[g.preset||'triangle']||PRISM_PRESETS.triangle;
    const sc=g.scale||1;
    const v=polyPerimeter(verts,sc);
    return {value:v, expr:`${v.toFixed(4)}`, label:`prism cross-section perimeter`, is2D:false};
  }
  return {value:1.0, expr:'1.0', label:'characteristic length P', is2D:false};
}

function syncScatterGeoId() {
  if(!S.run.scatterMode || S.run.trMode) return;
  const g = getScatterGeo();
  if(!g) S.run.scatterGeoId = S.geo.length > 0 ? S.geo[0].id : null;
}

// B3 — Auto-fill flux box: replace all monitors with 6-face box around scatter geo
function autoFillFluxBox(margin) {
  const g = getScatterGeo();
  if(!g) return;
  // Compute half-extents of the bounding box
  let hx=0.5, hy=0.5, hz=0.5;
  if(g.type==='Sphere')    { hx=hy=hz=g.r||0.5; }
  else if(g.type==='Cylinder'){ hx=g.r||0.5; hy=g.h/2||0.5; hz=g.r||0.5; }
  else if(g.type==='Block')   {
    const θ=(g.rot||0)*Math.PI/180, c=Math.abs(Math.cos(θ)), s=Math.abs(Math.sin(θ));
    hx=((g.wx||1)*c+(g.wz||1)*s)/2; hy=(g.wy||1)/2; hz=((g.wx||1)*s+(g.wz||1)*c)/2;
  }
  else if(g.type==='Cone')    { const mr=Math.max(g.r||0.5,g.r2||0); hx=mr; hy=g.h/2||0.5; hz=mr; }
  else if(g.type==='Pyramid') { hx=(g.wx||1)/2; hy=g.h/2||0.5; hz=(g.wz||g.wx||1)/2; }
  else if(g.type==='Prism')   { const s=(g.scale||1); hx=s; hy=g.h/2||0.5; hz=s; }
  else { hx=hy=hz=Math.max(g.r||0.5, (g.wx||1)/2, (g.h||1)/2); }

  const m  = margin;
  const cx = g.cx||0, cy = g.cy||0, cz = g.cz||0;
  const bx = hx+m, by = hy+m, bz = hz+m;
  const sx = S.cell.sx, sy = S.cell.sy, sz = S.cell.sz;

  // 6 faces: ±X, ±Y, ±Z
  const faces = [
    {label:'+X', cx:cx+bx, cy, cz, msx:0,   msy:2*by, msz:2*bz},
    {label:'-X', cx:cx-bx, cy, cz, msx:0,   msy:2*by, msz:2*bz},
    {label:'+Y', cx, cy:cy+by, cz, msx:2*bx, msy:0,   msz:2*bz},
    {label:'-Y', cx, cy:cy-by, cz, msx:2*bx, msy:0,   msz:2*bz},
    {label:'+Z', cx, cy, cz:cz+bz, msx:2*bx, msy:2*by, msz:0  },
    {label:'-Z', cx, cy, cz:cz-bz, msx:2*bx, msy:2*by, msz:0  },
  ];

  // In 2D mode, drop ±Z faces
  const is3D = S.cell.dim==='3D';
  const useFaces = is3D ? faces : faces.slice(0,4);

  mid = (S.monitors[S.monitors.length-1]?.id || mid);
  S.monitors = useFaces.map((f,i) => {
    mid++;
    return { id:mid, type:'flux_box_face', label:f.label,
             cx:+f.cx.toFixed(4), cy:+f.cy.toFixed(4), cz:+f.cz.toFixed(4),
             msx:+f.msx.toFixed(4), msy:+f.msy.toFixed(4), msz:+f.msz.toFixed(4) };
  });
  renderStage(cur);
  updateScript();
}

// ─── 3D SCENE ─────────────────────────────────────────────────────────────
let three = {
  renderer:null,scene:null,camera:null,
  isDragging:false,isRightDrag:false,
  lastX:0,lastY:0,
  theta:Math.PI/4,phi:Math.PI/4,radius:35,
  targetX:0,targetY:0,
  animId:null,objects:[]
};

function initRenderer() {
  const c = document.getElementById('canvas3d');
  if(!c||!window.THREE) return;
  if(three.renderer) { three.renderer.dispose(); }
  three.renderer = new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:false});
  three.renderer.setSize(c.width,c.height);
  three.renderer.setClearColor(0x07090f,1);
  three.renderer.shadowMap.enabled = true;
  three.scene = new THREE.Scene();
  three.camera = new THREE.PerspectiveCamera(45,c.width/c.height,0.1,1000);
  // Lights
  three.scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const d1=new THREE.DirectionalLight(0x00e5ff,0.6); d1.position.set(15,20,10); three.scene.add(d1);
  const d2=new THREE.DirectionalLight(0xffffff,0.3); d2.position.set(-10,-5,-15); three.scene.add(d2);
  // Mouse controls
  c.onmousedown = e=>{ three.isDragging=true; three.isRightDrag=(e.button===2); three.lastX=e.clientX; three.lastY=e.clientY; };
  c.onmousemove = e=>{
    if(!three.isDragging) return;
    const dx=e.clientX-three.lastX, dy=e.clientY-three.lastY;
    if(three.isRightDrag){ three.targetX-=dx*0.05; three.targetY+=dy*0.05; }
    else { three.theta-=dx*0.01; three.phi=Math.max(0.05,Math.min(Math.PI-0.05,three.phi-dy*0.01)); }
    three.lastX=e.clientX; three.lastY=e.clientY;
    render3D();
  };
  c.onmouseup=()=>three.isDragging=false;
  c.onmouseleave=()=>three.isDragging=false;
  c.oncontextmenu=e=>e.preventDefault();
  c.onwheel=e=>{ three.radius=Math.max(5,Math.min(100,three.radius+e.deltaY*0.05)); render3D(); e.preventDefault(); };
  build3DScene();
  render3D();
}

function updateCamera() {
  if(!three.camera) return;
  const x=three.radius*Math.sin(three.phi)*Math.cos(three.theta);
  const y=three.radius*Math.cos(three.phi);
  const z=three.radius*Math.sin(three.phi)*Math.sin(three.theta);
  three.camera.position.set(x+three.targetX,y+three.targetY,z);
  three.camera.lookAt(three.targetX,three.targetY,0);
}

function render3D() {
  if(!three.renderer||!three.scene||!three.camera) return;
  updateCamera();
  three.renderer.render(three.scene,three.camera);
}

function build3DScene() {
  if(!three.scene) return;
  // Clear old objects
  three.objects.forEach(o=>three.scene.remove(o));
  three.objects=[];
  const add=(o)=>{ three.scene.add(o); three.objects.push(o); };

  const sx=S.cell.sx||16, sy=S.cell.sy||8, sz=Math.max(S.cell.sz,0.5);

  // ── Cell wireframe
  const cellGeo=new THREE.BoxGeometry(sx,sy,sz);
  const edges=new THREE.EdgesGeometry(cellGeo);
  const cellLine=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0x1e3a5a,transparent:true,opacity:0.8}));
  add(cellLine);

  // ── PML box (per-axis)
  const hasPml=['x','y','z'].some(ax=>S.bc[ax]==='pml');
  if(hasPml) {
    const tx=S.bc.x==='pml'?S.bc.pmlX:0;
    const ty=S.bc.y==='pml'?S.bc.pmlY:0;
    const tz=S.bc.z==='pml'?S.bc.pmlZ:0;
    const pmlMat=new THREE.MeshBasicMaterial({color:0xff4444,transparent:true,opacity:0.05,side:THREE.BackSide});
    add(new THREE.Mesh(new THREE.BoxGeometry(sx,sy,sz),pmlMat));
    const innerW=Math.max(0.1,sx-tx*2), innerH=Math.max(0.1,sy-ty*2), innerD=Math.max(0.1,sz-tz*2);
    const innerEdges=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(innerW,innerH,innerD)),new THREE.LineBasicMaterial({color:0xff4444,transparent:true,opacity:0.5}));
    add(innerEdges);
  }

  // ── Layer stack (flat slabs)
  const sa = S.layers_stackAxis || 'Y';
  let lpos = sa==='X' ? -sx/2 : sa==='Y' ? -sy/2 : -sz/2;
  S.layers.forEach(l=>{
    const mat=new THREE.MeshPhongMaterial({color:MAT_COL_HEX[l.mat]||0x9696c8,transparent:true,opacity:l.opacity||0.45,side:THREE.DoubleSide});
    // BoxGeometry args: (width=X, height=Y, depth=Z)
    const geoArgs = sa==='X' ? [l.t, sy, sz] : sa==='Y' ? [sx, l.t, sz] : [sx, sy, l.t];
    const mesh=new THREE.Mesh(new THREE.BoxGeometry(...geoArgs),mat);
    const cx = sa==='X' ? lpos+l.t/2 : 0;
    const cy = sa==='Y' ? lpos+l.t/2 : 0;
    const cz = sa==='Z' ? lpos+l.t/2 : 0;
    mesh.position.set(cx,cy,cz);
    add(mesh);
    const we=new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(...geoArgs)),new THREE.LineBasicMaterial({color:MAT_COL_HEX[l.mat]||0x9696c8,transparent:true,opacity:0.6}));
    we.position.copy(mesh.position);
    add(we);
    lpos+=l.t;
  });

  // ── Geometry objects
  S.geo.forEach(g=>{
    const col=MAT_COL_HEX[g.mat]||0x9696ff;
    const op=g.opacity!==undefined?g.opacity:0.65;
    const mat=new THREE.MeshPhongMaterial({color:col,transparent:true,opacity:op,side:THREE.DoubleSide});
    const wireMat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:Math.min(1,op+0.3)});
    let mesh,wire;
    if(g.type==='Block'){
      const bwx = g.wx_inf ? S.cell.sx : g.wx;
      const bwy = g.wy_inf ? S.cell.sy : g.wy;
      const bwz = g.wz_inf ? (S.cell.sz||1) : Math.max(g.wz||0,0.3);
      const geo=new THREE.BoxGeometry(bwx,bwy,bwz);
      mesh=new THREE.Mesh(geo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat);
      if(g.rot){ mesh.rotation.y=(g.rot)*Math.PI/180; wire.rotation.y=mesh.rotation.y; }
    } else if(g.type==='Cylinder'){
      const geo=new THREE.CylinderGeometry(g.r,g.r,Math.max(g.h||1,0.3),32);
      mesh=new THREE.Mesh(geo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat);
      // CylinderGeometry default = Y-up. Rotate to each target axis:
      // +Y=none, -Y=rotX π, +Z=rotX -π/2, -Z=rotX +π/2, +X=rotZ +π/2, -X=rotZ -π/2
      const applyAxisRot = (obj, axis) => {
        if(axis==='+Z'||axis===null){ obj.rotation.x=-Math.PI/2; }
        else if(axis==='-Z'){ obj.rotation.x=Math.PI/2; }
        else if(axis==='+X'){ obj.rotation.z=Math.PI/2; }
        else if(axis==='-X'){ obj.rotation.z=-Math.PI/2; }
        else if(axis==='-Y'){ obj.rotation.x=Math.PI; }
        // +Y: default, no rotation needed
      };
      applyAxisRot(mesh, g.axis); applyAxisRot(wire, g.axis);
    } else if(g.type==='Sphere'){
      const geo=new THREE.SphereGeometry(g.r,32,16);
      mesh=new THREE.Mesh(geo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat);
    } else if(g.type==='Cone'){
      const rTop=g.r2!==undefined?g.r2:0;
      const geo=new THREE.CylinderGeometry(rTop,g.r||0.5,Math.max(g.h||1,0.1),32);
      mesh=new THREE.Mesh(geo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat);
      // CylinderGeometry(rTop, rBase): rBase sits at -Y, rTop at +Y.
      // MEEP axis = direction from base→tip, so we rotate -Y onto the target axis.
      // -Y→+Z: rotX=+π/2  -Y→-Z: rotX=-π/2  -Y→+X: rotZ=-π/2  -Y→-X: rotZ=+π/2
      const applyAxisRotCone = (obj, axis) => {
        if(axis==='+Z'||axis===null){ obj.rotation.x=Math.PI/2; }
        else if(axis==='-Z'){ obj.rotation.x=-Math.PI/2; }
        else if(axis==='+X'){ obj.rotation.z=-Math.PI/2; }
        else if(axis==='-X'){ obj.rotation.z=Math.PI/2; }
        else if(axis==='-Y'){ obj.rotation.x=Math.PI; }
        // +Y: base at -Y, tip at +Y — default orientation is already correct
      };
      applyAxisRotCone(mesh, g.axis); applyAxisRotCone(wire, g.axis);
    } else if(g.type==='Pyramid'){
      const geo=new THREE.CylinderGeometry(0,Math.max(g.wx||1,g.wz||1)*0.5,Math.max(g.h||1,0.1),4);
      mesh=new THREE.Mesh(geo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(geo),wireMat);
      // Pyramid: same axis rotations + always π/4 around the axis for flat-face alignment
      // Apply via Euler order XYZ — add the π/4 yaw depending on final up-axis
      const applyAxisRotPyr = (obj, axis) => {
        if(axis==='+Z'||axis===null){ obj.rotation.x=Math.PI/2; obj.rotation.z=Math.PI/4; }
        else if(axis==='-Z'){ obj.rotation.x=-Math.PI/2; obj.rotation.z=Math.PI/4; }
        else if(axis==='+X'){ obj.rotation.z=-Math.PI/2; obj.rotation.x=Math.PI/4; }
        else if(axis==='-X'){ obj.rotation.z=Math.PI/2; obj.rotation.x=Math.PI/4; }
        else if(axis==='+Y'){ obj.rotation.y=Math.PI/4; }
        else if(axis==='-Y'){ obj.rotation.x=Math.PI; obj.rotation.y=Math.PI/4; }
      };
      applyAxisRotPyr(mesh, g.axis); applyAxisRotPyr(wire, g.axis);
    } else if(g.type==='Prism'){
      const verts=PRISM_PRESETS[g.preset]||PRISM_PRESETS.triangle;
      const shape=new THREE.Shape();
      const sc=g.scale||1;
      shape.moveTo(verts[0][0]*sc,verts[0][1]*sc);
      for(let i=1;i<verts.length;i++) shape.lineTo(verts[i][0]*sc,verts[i][1]*sc);
      shape.closePath();
      const extGeo=new THREE.ExtrudeGeometry(shape,{depth:Math.max(g.h||1,0.3),bevelEnabled:false});
      mesh=new THREE.Mesh(extGeo,mat);
      wire=new THREE.LineSegments(new THREE.EdgesGeometry(extGeo),wireMat);
      mesh.rotation.x=-Math.PI/2;
      if(wire) wire.rotation.x=-Math.PI/2;
      if(g.rot){ mesh.rotation.z=(g.rot)*Math.PI/180; if(wire) wire.rotation.z=mesh.rotation.z; }
    }
    if(mesh){ mesh.position.set(g.cx,g.cy,g.cz||0); add(mesh); }
    if(wire){ wire.position.set(g.cx,g.cy,g.cz||0); add(wire); }
  });

  // ── Periodic Arrays — loop over all defined arrays
  S.perArrays.forEach(p => {
    const g=getPerGeoForArray(p);
    if(!g) return;
      const pcol=MAT_COL_HEX[g.mat]||0xc0a0ff;
      const pop=g.opacity!==undefined?g.opacity:0.65;
      const pMat=new THREE.MeshPhongMaterial({color:pcol,transparent:true,opacity:pop,side:THREE.DoubleSide});
      const pWire=new THREE.LineBasicMaterial({color:pcol,transparent:true,opacity:Math.min(1,pop+0.3)});
      const nz=S.cell.dim==='3D'?(p.nz||1):1;
      const ox=p.cx0||0, oy=p.cy0||0, oz=p.cz0||0;
      const ox0=-(p.nx-1)*p.ax/2+ox, oy0=-(p.ny-1)*p.ay/2+oy, oz0=-(nz-1)*(p.az||p.ax)/2+oz;
      for(let ix=0;ix<p.nx;ix++) for(let iy=0;iy<p.ny;iy++) for(let iz=0;iz<nz;iz++){
        const cx=ox0+ix*p.ax, cy=oy0+iy*p.ay, cz=oz0+iz*(p.az||p.ax);
        let pg,pm,pw;
        if(g.type==='Cylinder'){
          pg=new THREE.CylinderGeometry(g.r,g.r,Math.max(g.h||1,0.05),24);
        } else if(g.type==='Sphere'){
          pg=new THREE.SphereGeometry(g.r,20,12);
        } else if(g.type==='Block'){
          pg=new THREE.BoxGeometry(g.wx||0.2,g.wz||g.wx||0.2,g.wy||g.wx||0.2);
        } else if(g.type==='Cone'){
          pg=new THREE.CylinderGeometry(g.r2||0,g.r||0.2,Math.max(g.h||0.3,0.05),24);
        } else if(g.type==='Pyramid'){
          pg=new THREE.CylinderGeometry(0,Math.max(g.wx||0.2,g.wz||g.wx||0.2)*0.5,Math.max(g.h||0.3,0.05),4);
        } else if(g.type==='Prism'){
          const verts=PRISM_PRESETS[g.preset]||PRISM_PRESETS.triangle;
          const shape3=new THREE.Shape();
          const sc3=g.scale||1;
          shape3.moveTo(verts[0][0]*sc3,verts[0][1]*sc3);
          for(let i=1;i<verts.length;i++) shape3.lineTo(verts[i][0]*sc3,verts[i][1]*sc3);
          shape3.closePath();
          pg=new THREE.ExtrudeGeometry(shape3,{depth:Math.max(g.h||1,0.3),bevelEnabled:false});
        }
        if(pg){
          pm=new THREE.Mesh(pg,pMat.clone());
          pw=new THREE.LineSegments(new THREE.EdgesGeometry(pg),pWire.clone());
          pm.position.set(cx, cz, cy);
          pw.position.set(cx, cz, cy);
          if(g.type==='Cylinder'||g.type==='Cone'){
            const ax=g.axis;
            if(g.type==='Cylinder'){
              if(ax==='+Z'||ax===null){ pm.rotation.x=-Math.PI/2; pw.rotation.x=-Math.PI/2; }
              else if(ax==='-Z'){ pm.rotation.x=Math.PI/2; pw.rotation.x=Math.PI/2; }
              else if(ax==='+X'){ pm.rotation.z=Math.PI/2; pw.rotation.z=Math.PI/2; }
              else if(ax==='-X'){ pm.rotation.z=-Math.PI/2; pw.rotation.z=-Math.PI/2; }
              else if(ax==='-Y'){ pm.rotation.x=Math.PI; pw.rotation.x=Math.PI; }
            } else {
              if(ax==='+Z'||ax===null){ pm.rotation.x=Math.PI/2; pw.rotation.x=Math.PI/2; }
              else if(ax==='-Z'){ pm.rotation.x=-Math.PI/2; pw.rotation.x=-Math.PI/2; }
              else if(ax==='+X'){ pm.rotation.z=-Math.PI/2; pw.rotation.z=-Math.PI/2; }
              else if(ax==='-X'){ pm.rotation.z=Math.PI/2; pw.rotation.z=Math.PI/2; }
              else if(ax==='-Y'){ pm.rotation.x=Math.PI; pw.rotation.x=Math.PI; }
            }
          } else if(g.type==='Pyramid'){
            const ax=g.axis;
            if(ax==='+Z'||ax===null){ pm.rotation.x=Math.PI/2; pm.rotation.z=Math.PI/4; pw.rotation.x=Math.PI/2; pw.rotation.z=Math.PI/4; }
            else if(ax==='-Z'){ pm.rotation.x=-Math.PI/2; pm.rotation.z=Math.PI/4; pw.rotation.x=-Math.PI/2; pw.rotation.z=Math.PI/4; }
            else if(ax==='+X'){ pm.rotation.z=-Math.PI/2; pm.rotation.x=Math.PI/4; pw.rotation.z=-Math.PI/2; pw.rotation.x=Math.PI/4; }
            else if(ax==='-X'){ pm.rotation.z=Math.PI/2; pm.rotation.x=Math.PI/4; pw.rotation.z=Math.PI/2; pw.rotation.x=Math.PI/4; }
            else if(ax==='+Y'){ pm.rotation.y=Math.PI/4; pw.rotation.y=Math.PI/4; }
            else if(ax==='-Y'){ pm.rotation.x=Math.PI; pm.rotation.y=Math.PI/4; pw.rotation.x=Math.PI; pw.rotation.y=Math.PI/4; }
          } else if(g.type==='Prism'){
            pm.rotation.x=-Math.PI/2; pw.rotation.x=-Math.PI/2;
          }
          add(pm); add(pw);
        }
      }
  });

  // ── Sources — plane-aware with direction arrow
  S.sources.forEach(s=>{
    const szx=s.szx||0, szy=s.szy||0, szz=s.szz||0;
    const sp=s.srcPlane||'none';
    const isPlane=(sp!=='none')||(szx>0||szy>0||szz>0)||s.type==='PlaneWave';
    if(s.type==='PlaneWave'||isPlane){
      const planeMat=new THREE.MeshBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.18,side:THREE.DoubleSide});
      const edgeMat=new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.85});
      let planeGeo, rot={x:0,y:0,z:0};
      const effPlane = sp!=='none' ? sp : (szy===0?'XZ': szx===0?'YZ':'XY');
      if(effPlane==='XY'){
        planeGeo=new THREE.PlaneGeometry(szx||sx, szy||sy);
      } else if(effPlane==='XZ'){
        planeGeo=new THREE.PlaneGeometry(szx||sx, szz||sz);
        rot.x=Math.PI/2;
      } else {
        planeGeo=new THREE.PlaneGeometry(szy||sy, szz||sz);
        rot.y=Math.PI/2;
      }
      const plane=new THREE.Mesh(planeGeo,planeMat);
      const py=s.type==='PlaneWave'?sy/2-(S.bc.pmlY||1)-0.5:s.cy||0;
      plane.position.set(s.cx||0,py,s.cz||0);
      plane.rotation.set(rot.x,rot.y,rot.z);
      add(plane);
      const edge=new THREE.LineSegments(new THREE.EdgesGeometry(planeGeo),edgeMat);
      edge.position.copy(plane.position); edge.rotation.copy(plane.rotation);
      add(edge);
      // Direction arrow
      const dir=s.srcDir||'+X';
      const dirMap={'+X':new THREE.Vector3(1,0,0),'−X':new THREE.Vector3(-1,0,0),'-X':new THREE.Vector3(-1,0,0),
                    '+Y':new THREE.Vector3(0,1,0),'−Y':new THREE.Vector3(0,-1,0),'-Y':new THREE.Vector3(0,-1,0),
                    '+Z':new THREE.Vector3(0,0,1),'−Z':new THREE.Vector3(0,0,-1),'-Z':new THREE.Vector3(0,0,-1)};
      const arrowDir=dirMap[dir]||new THREE.Vector3(1,0,0);
      const arrowLen=Math.min(sx,sy,sz)*0.45;
      const arrow=new THREE.ArrowHelper(arrowDir, plane.position, arrowLen, 0x00e5ff, arrowLen*0.3, arrowLen*0.2);
      add(arrow);
    } else if(s.type==='RandomDipoles'){
      for(let i=0;i<Math.min(s.ndip||6,10);i++){
        const rx=(Math.random()-0.5)*(s.rw||0.5), ry=(Math.random()-0.5)*(s.rh||0.05);
        const dot=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),new THREE.MeshBasicMaterial({color:0x00e5ff}));
        dot.position.set((s.cx||0)+rx,(s.cy||0)+ry,0);
        add(dot);
      }
    } else {
      // Point source — vertical line + sphere
      const pts=[new THREE.Vector3(s.cx||0,-sy/2,s.cz||0),new THREE.Vector3(s.cx||0,sy/2,s.cz||0)];
      const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0x00e5ff,transparent:true,opacity:0.5}));
      add(line);
      const dot=new THREE.Mesh(new THREE.SphereGeometry(0.25,16,16),new THREE.MeshBasicMaterial({color:0x00e5ff}));
      dot.position.set(s.cx||0,s.cy||0,s.cz||0);
      add(dot);
    }
  });

  // ── Monitors — full 3-axis size
  const monColors={transmission:0x10d98a,reflection:0xef4444,substrate:0xec4899,nearfar:0x00e5ff};
  S.monitors.forEach(m=>{
    const col=monColors[m.type]||0xffffff;
    const monMat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.18,side:THREE.DoubleSide});
    const monEdgeMat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.9});
    const msx=m.msx||0, msy=m.msy||0, msz=m.msz||0;
    // Determine orientation from which size is zero
    let mg, mMesh, mEdge;
    if(msz===0){       // XY plane
      mg=new THREE.PlaneGeometry(msx||sx, msy||sy);
      mMesh=new THREE.Mesh(mg,monMat);
      mMesh.position.set(m.cx||0,m.cy||0,m.cz||0);
    } else if(msy===0){ // XZ plane
      mg=new THREE.PlaneGeometry(msx||sx, msz||sz);
      mMesh=new THREE.Mesh(mg,monMat);
      mMesh.position.set(m.cx||0,m.cy||0,m.cz||0);
      mMesh.rotation.x=Math.PI/2;
    } else {            // YZ plane (or msx===0)
      mg=new THREE.PlaneGeometry(msy||sy, msz||sz);
      mMesh=new THREE.Mesh(mg,monMat);
      mMesh.position.set(m.cx||0,m.cy||0,m.cz||0);
      mMesh.rotation.y=Math.PI/2;
    }
    mEdge=new THREE.LineSegments(new THREE.EdgesGeometry(mg),monEdgeMat);
    mEdge.position.copy(mMesh.position); mEdge.rotation.copy(mMesh.rotation);
    add(mMesh); add(mEdge);
  });

  // Axes helper — arrows + X/Y/Z labels
  const axLen=Math.max(sx,sy)/2+2;
  const axColors=[0xff4444,0x44ff44,0x4444ff];
  const axNames=['X','Y','Z'];
  ['X','Y','Z'].forEach((axName,i)=>{
    const dir=[new THREE.Vector3(1,0,0),new THREE.Vector3(0,1,0),new THREE.Vector3(0,0,1)][i];
    const origin=new THREE.Vector3(-sx/2,-sy/2,-sz/2);
    const arr=new THREE.ArrowHelper(dir,origin,axLen*0.6,axColors[i],0.4,0.2);
    add(arr);
    // Label sprite at tip
    const canvas2=document.createElement('canvas'); canvas2.width=64; canvas2.height=64;
    const ctx2=canvas2.getContext('2d');
    ctx2.clearRect(0,0,64,64);
    ctx2.font='bold 40px sans-serif';
    ctx2.fillStyle=['#ff4444','#44ff44','#4488ff'][i];
    ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.fillText(axName,32,32);
    const tex=new THREE.CanvasTexture(canvas2);
    const spMat=new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:false});
    const sprite=new THREE.Sprite(spMat);
    const tipPos=origin.clone().addScaledVector(dir,axLen*0.6+0.9);
    sprite.position.copy(tipPos);
    sprite.scale.set(1.1,1.1,1.1);
    add(sprite);
  });

  render3D();
}

// ─── 2D CANVAS ────────────────────────────────────────────────────────────
// plane: 'XY'|'XZ'|'YZ'  hAxis=horizontal world axis, vAxis=vertical world axis
function getPlaneAxes(plane) {
  if(plane==='XY') return {h:'x',v:'y', hSize:S.cell.sx, vSize:S.cell.sy, hLabel:'X →', vLabel:'↑ Y'};
  if(plane==='XZ') return {h:'x',v:'z', hSize:S.cell.sx, vSize:S.cell.sz, hLabel:'X →', vLabel:'↑ Z'};
  return           {h:'y',v:'z', hSize:S.cell.sy, vSize:S.cell.sz, hLabel:'Y →', vLabel:'↑ Z'};
}

function draw2D(canvasId='c2d', plane) {
  const c=document.getElementById(canvasId); if(!c)return;
  plane = plane || S.view2dPlane || 'XY';
  const ax=getPlaneAxes(plane);
  const hsz=ax.hSize||16, vsz=ax.vSize||8, pad=22;

  // ── Dynamic canvas sizing: maintain correct world aspect ratio ─────────────
  // Available drawing area (inside padding): target up to 516px wide, 380px tall
  const maxDraw = 516, maxDrawH = 380, minDraw = 80;
  const worldAspect = hsz / vsz;
  let drawW, drawH;
  if(worldAspect >= maxDraw / maxDrawH) {
    drawW = maxDraw;
    drawH = Math.max(minDraw, Math.round(maxDraw / worldAspect));
  } else {
    drawH = maxDrawH;
    drawW = Math.max(minDraw, Math.round(maxDrawH * worldAspect));
  }
  c.width  = drawW + pad * 2;
  c.height = drawH + pad * 2;

  const ctx=c.getContext('2d'), W=c.width, H=c.height;
  // Uniform scale — 1 world unit = same px in both axes
  const sc = drawW / hsz;   // == drawH / vsz by construction
  const ox=W/2, oy=H/2;
  // Alias scX/scY to sc so all downstream drawing code is unchanged
  const scX=sc, scY=sc;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#07090f'; ctx.fillRect(0,0,W,H);

  // Cell border
  ctx.strokeStyle='#1e2d3d'; ctx.lineWidth=1.5;
  ctx.strokeRect(pad,pad,W-pad*2,H-pad*2);

  // Grid
  ctx.strokeStyle='rgba(30,45,61,0.5)'; ctx.lineWidth=0.5;
  for(let i=-Math.floor(hsz/2);i<=Math.ceil(hsz/2);i+=2){const px=ox+i*scX;ctx.beginPath();ctx.moveTo(px,pad);ctx.lineTo(px,H-pad);ctx.stroke();}
  for(let i=-Math.floor(vsz/2);i<=Math.ceil(vsz/2);i+=2){const py=oy+i*scY;ctx.beginPath();ctx.moveTo(pad,py);ctx.lineTo(W-pad,py);ctx.stroke();}

  // PML — show for relevant axes
  const hPmlAx = ax.h==='x'?'x':ax.h==='y'?'y':'z';
  const vPmlAx = ax.v==='y'?'y':ax.v==='z'?'z':'x';
  const hPml = S.bc[hPmlAx]==='pml', vPml = S.bc[vPmlAx]==='pml';
  const tH=(S.bc[`pml${hPmlAx.toUpperCase()}`]||1)*scX;
  const tV=(S.bc[`pml${vPmlAx.toUpperCase()}`]||1)*scY;
  ctx.fillStyle='rgba(239,68,68,0.07)';
  if(hPml){ctx.fillRect(pad,pad,tH,H-pad*2);ctx.fillRect(W-pad-tH,pad,tH,H-pad*2);}
  if(vPml){ctx.fillRect(pad,pad,W-pad*2,tV);ctx.fillRect(pad,H-pad-tV,W-pad*2,tV);}
  if(hPml||vPml){
    ctx.strokeStyle='rgba(239,68,68,0.35)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    ctx.strokeRect(pad+(hPml?tH:0),pad+(vPml?tV:0),W-pad*2-(hPml?tH*2:0),H-pad*2-(vPml?tV*2:0));
    ctx.setLineDash([]);
  }

  // Helper: world coords → canvas pixels
  // Note: canvas Y increases downward, so we negate vVal to make +y go UP (standard math convention)
  const wp=(hVal,vVal)=>[ox+hVal*scX, oy-vVal*scY];
  // Get h,v values from object by axis name
  const hv=(obj,hax,vax)=>{
    const h=hax==='x'?obj.cx:hax==='y'?obj.cy:obj.cz||0;
    const v=vax==='y'?obj.cy:vax==='z'?obj.cz||0:obj.cx;
    return [h,v];
  };

  // Layers — only draw if stacking axis is the vertical axis of the current view
  // (so they appear as horizontal bands). If stacking axis is horizontal or out-of-plane, skip.
  const sa = (S.layers_stackAxis || 'Y').toLowerCase();
  if(sa === ax.v && S.layers.length){
    // Cell half-extent along stacking axis
    const stackSz = sa==='x' ? S.cell.sx : sa==='y' ? S.cell.sy : S.cell.sz;
    let lyOff = -stackSz/2;
    S.layers.forEach(l=>{
      ctx.fillStyle=MAT_COLORS[l.mat]||'rgba(150,150,200,0.3)';
      // Y is flipped: world -stackSz/2 → canvas bottom; layers stack upward
      ctx.fillRect(pad, oy-(lyOff+l.t)*scY, W-pad*2, l.t*scY);
      lyOff+=l.t;
    });
  }

  // Geometry — project onto plane
  S.geo.forEach(g=>{
    // Use per-geometry opacity; extract base color from MAT_COL_HEX and apply g.opacity
    const hexCol = MAT_COL_HEX[g.mat]||0x9696ff;
    const cr=((hexCol>>16)&255), cg_=((hexCol>>8)&255), cb_=hexCol&255;
    const op = g.opacity !== undefined ? g.opacity : 0.65;
    ctx.fillStyle=`rgba(${cr},${cg_},${cb_},${op})`;
    ctx.strokeStyle=`rgba(${cr},${cg_},${cb_},${Math.min(1,op+0.25)})`; ctx.lineWidth=1.5;
    const [hc,vc]=hv(g,ax.h,ax.v);

    if(g.type==='Block'||g.type==='Rectangle'){
      const rawHw = ax.h==='x'?g.wx:ax.h==='y'?g.wy:g.wz||0.5;
      const rawVw = ax.v==='y'?g.wy:ax.v==='z'?g.wz||0.5:g.wx;
      const infH = ax.h==='x'?g.wx_inf:ax.h==='y'?g.wy_inf:g.wz_inf;
      const infV = ax.v==='y'?g.wy_inf:ax.v==='z'?g.wz_inf:g.wx_inf;
      const hw = infH ? (ax.h==='x'?S.cell.sx:ax.h==='y'?S.cell.sy:S.cell.sz||1) : rawHw;
      const vw = infV ? (ax.v==='y'?S.cell.sy:ax.v==='z'?S.cell.sz||1:S.cell.sx) : rawVw;
      const [cpx,cpy]=wp(infH?0:hc, infV?0:vc);
      const rot = (g.rot||0)*Math.PI/180;
      // After Y-flip: draw centered on cpx,cpy; half-extents stay symmetric
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.fillRect(-hw/2*scX,-vw/2*scY,hw*scX,vw*scY);
      ctx.strokeRect(-hw/2*scX,-vw/2*scY,hw*scX,vw*scY);
      ctx.restore();
    } else if(g.type==='Square'){
      const s2=g.wx||1;
      const [cpx,cpy]=wp(hc,vc);
      const rot = (g.rot||0)*Math.PI/180;
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.fillRect(-s2/2*scX,-s2/2*scY,s2*scX,s2*scY);
      ctx.strokeRect(-s2/2*scX,-s2/2*scY,s2*scX,s2*scY);
      ctx.restore();
    } else if(g.type==='Circle'||g.type==='Sphere'){
      const [px,py]=wp(hc,vc);
      ctx.beginPath(); ctx.arc(px,py,(g.r||0.5)*Math.min(scX,scY),0,Math.PI*2);
      ctx.fill(); ctx.stroke();
    } else if(g.type==='Cylinder'){
      // end-on when geo axis letter === missing axis of view plane
      const gAx = (g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
      const viewPerp = (plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
      if(viewPerp){
        const [px,py]=wp(hc,vc);
        ctx.beginPath(); ctx.arc(px,py,(g.r||0.5)*Math.min(scX,scY),0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      } else {
        // Side-on → rectangle 2r × h. Orient h/v by which view axis aligns with geo axis.
        const rw=g.r||0.5, rh=g.h||1;
        // If geo axis is along the view's h axis → h=height, v=2r; else h=2r, v=height
        const axAlongH = (gAx===ax.h.toUpperCase());
        const [pw,ph] = axAlongH ? [rh,rw*2] : [rw*2,rh];
        // Use center for correct Y-flip: translate to center, draw symmetric rect
        const [cpx,cpy]=wp(hc, vc);
        ctx.fillRect(cpx-pw/2*scX, cpy-ph/2*scY, pw*scX, ph*scY);
        ctx.strokeRect(cpx-pw/2*scX, cpy-ph/2*scY, pw*scX, ph*scY);
      }
    } else if(g.type==='Cone'){
      const gAx = (g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
      const viewPerp = (plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
      const r=g.r||0.5, r2=g.r2!==undefined?g.r2:0, h=g.h||1;
      if(viewPerp){
        const maxR = Math.max(r, r2);
        const [px,py]=wp(hc,vc); ctx.beginPath();
        ctx.arc(px,py,maxR*Math.min(scX,scY),0,Math.PI*2); ctx.fill(); ctx.stroke();
      } else {
        // Side-on → trapezoid. Determine which view direction is "along" the geo axis.
        // base(r) is in the direction the axis sign points; tip(r2) is opposite.
        const axAlongH = (gAx===ax.h.toUpperCase());
        const negative = g.axis && g.axis[0]==='-';
        // baseR side faces the axis direction, tipR faces away
        const [baseR, tipR] = negative ? [r2, r] : [r, r2];
        if(axAlongH){
          // Axis runs left-right; trapezoid is horizontal (wide left, narrow right or vice versa)
          const [lx,ly]=wp(hc-h/2, vc-baseR);
          const [lx2,ly2]=wp(hc-h/2, vc+baseR);
          const [rx,ry]=wp(hc+h/2, vc+tipR);
          const [rx2,ry2]=wp(hc+h/2, vc-tipR);
          ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx2,ly2); ctx.lineTo(rx,ry); ctx.lineTo(rx2,ry2);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        } else {
          // Axis runs up-down; standard trapezoid
          const [tlx,tly]=wp(hc-tipR, vc+h/2);
          const [trx,try_]=wp(hc+tipR, vc+h/2);
          const [brx,bry]=wp(hc+baseR, vc-h/2);
          const [blx,bly]=wp(hc-baseR, vc-h/2);
          ctx.beginPath(); ctx.moveTo(blx,bly); ctx.lineTo(brx,bry); ctx.lineTo(trx,try_); ctx.lineTo(tlx,tly);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        }
      }
    } else if(g.type==='Pyramid'){
      const gAx = (g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
      const viewPerp = (plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
      const wx=g.wx||1, wz_=g.wz||wx, h=g.h||1;
      if(viewPerp){
        // End-on: show rectangular base, centered
        const [cpx,cpy]=wp(hc, vc);
        ctx.fillRect(cpx-wx/2*scX, cpy-wz_/2*scY, wx*scX, wz_*scY);
        ctx.strokeRect(cpx-wx/2*scX, cpy-wz_/2*scY, wx*scX, wz_*scY);
      } else {
        // Side-on → triangle. Base width depends on view plane.
        const axAlongH = (gAx===ax.h.toUpperCase());
        const negative = g.axis && g.axis[0]==='-';
        // Which base dimension is visible in this view?
        const bw = (plane==='XZ') ? wx/2 : (plane==='YZ') ? wz_/2 : (axAlongH ? wz_/2 : wx/2);
        if(axAlongH){
          // Axis runs left-right; triangle points left or right
          const [tipX,tipY] = negative ? wp(hc-h/2, vc) : wp(hc+h/2, vc);
          const [b1x,b1y] = negative ? wp(hc+h/2, vc-bw) : wp(hc-h/2, vc-bw);
          const [b2x,b2y] = negative ? wp(hc+h/2, vc+bw) : wp(hc-h/2, vc+bw);
          ctx.beginPath(); ctx.moveTo(tipX,tipY); ctx.lineTo(b1x,b1y); ctx.lineTo(b2x,b2y);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        } else {
          // Axis runs up-down
          const [tipX,tipY] = negative ? wp(hc, vc-h/2) : wp(hc, vc+h/2);
          const [brx,bry]   = negative ? wp(hc+bw, vc+h/2) : wp(hc+bw, vc-h/2);
          const [blx,bly]   = negative ? wp(hc-bw, vc+h/2) : wp(hc-bw, vc-h/2);
          ctx.beginPath(); ctx.moveTo(tipX,tipY); ctx.lineTo(brx,bry); ctx.lineTo(blx,bly);
          ctx.closePath(); ctx.fill(); ctx.stroke();
        }
      }
    } else if(g.type==='Triangle'){
      const verts=PRISM_PRESETS['triangle'], sc=g.scale||1;
      const rot=(g.rot||0)*Math.PI/180;
      const [cpx,cpy]=wp(hc,vc);
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.beginPath();
      // Flip local Y so polygon vertices follow math convention (+y up)
      verts.forEach(([vx,vy],i)=>{const px=vx*sc*scX, py=-vy*sc*scY; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(g.type==='Hexagon'){
      const verts=PRISM_PRESETS['hexagon'], sc=g.scale||0.6;
      const rot=(g.rot||0)*Math.PI/180;
      const [cpx,cpy]=wp(hc,vc);
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.beginPath();
      verts.forEach(([vx,vy],i)=>{const px=vx*sc*scX, py=-vy*sc*scY; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(g.type==='Polygon'){
      const verts=g.polyVerts||[[0,0.5],[0.5,-0.5],[-0.5,-0.5]], sc=g.scale||1;
      const rot=(g.rot||0)*Math.PI/180;
      const [cpx,cpy]=wp(hc,vc);
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.beginPath();
      verts.forEach(([vx,vy],i)=>{const px=vx*sc*scX, py=-vy*sc*scY; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    } else if(g.type==='Prism'){
      const verts=PRISM_PRESETS[g.preset||'triangle'], sc=g.scale||1;
      const rot=(g.rot||0)*Math.PI/180;
      const [cpx,cpy]=wp(hc,vc);
      ctx.save(); ctx.translate(cpx,cpy); ctx.rotate(rot);
      ctx.beginPath();
      verts.forEach(([vx,vy],i)=>{const px=vx*sc*scX, py=-vy*sc*scY; i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);});
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.restore();
    }
  });  // end S.geo.forEach

  // ── Periodic Arrays (2D canvas) — loop over all arrays
  S.perArrays.forEach(p => {
    const g=getPerGeoForArray(p);
    if(!g) return;
      const hexCol=MAT_COL_HEX[g.mat]||0xc0a0ff;
      const cr=((hexCol>>16)&255), cg2=((hexCol>>8)&255), cb=hexCol&255;
      const op=g.opacity!==undefined?g.opacity:0.65;
      ctx.fillStyle=`rgba(${cr},${cg2},${cb},${op})`;
      ctx.strokeStyle=`rgba(${cr},${cg2},${cb},${Math.min(1,op+0.3)})`;
      ctx.lineWidth=1.5;
      const is3D = S.cell.dim==='3D';
      const nH = ax.h==='x' ? p.nx : ax.h==='y' ? p.ny : (is3D ? (p.nz||1) : p.nx);
      const nV = ax.v==='y' ? p.ny : ax.v==='z' ? (is3D ? (p.nz||1) : p.ny) : p.nx;
      const periodH = ax.h==='x' ? p.ax : ax.h==='y' ? p.ay : (is3D ? (p.az||p.ax) : p.ax);
      const periodV = ax.v==='y' ? p.ay : ax.v==='z' ? (is3D ? (p.az||p.ax) : p.ay) : p.ax;
      const originH = (ax.h==='x'?p.cx0:ax.h==='y'?p.cy0:p.cz0)||0;
      const originV = (ax.v==='y'?p.cy0:ax.v==='z'?p.cz0:p.cx0)||0;
      const startH = -(nH-1)*periodH/2 + originH;
      const startV = -(nV-1)*periodV/2 + originV;
      for(let ir=0;ir<nH;ir++) for(let ic=0;ic<nV;ic++){
        const hcPos=startH+ir*periodH;
        const vcPos=startV+ic*periodV;
        ctx.beginPath();
        if(g.type==='Cylinder'||g.type==='Sphere'||g.type==='Circle'){
          const gAx = (g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
          const viewPerp = (g.type==='Sphere'||g.type==='Circle')
            || (plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
          if(viewPerp){
            const [px,py]=wp(hcPos,vcPos);
            const [px2]=wp(hcPos+(g.r||0.2),vcPos);
            ctx.arc(px,py,Math.max(Math.abs(px2-px),1),0,Math.PI*2);
          } else {
            const rw=g.r||0.2, rh=g.h||1;
            const axAlongH = (gAx===ax.h.toUpperCase());
            const [pw2,ph2] = axAlongH ? [rh,rw*2] : [rw*2,rh];
            const [x1,y1]=wp(hcPos-pw2/2,vcPos-ph2/2);
            const [x2,y2]=wp(hcPos+pw2/2,vcPos+ph2/2);
            ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.max(Math.abs(x2-x1),2),Math.max(Math.abs(y2-y1),2));
          }
        } else if(g.type==='Block'||g.type==='Rectangle'){
          const bhw=(ax.h==='x'?g.wx:ax.h==='y'?g.wy:g.wz||g.wx)||0.2;
          const bvw=(ax.v==='y'?g.wy:ax.v==='z'?g.wz||g.wx:g.wx)||0.2;
          const [x1,y1]=wp(hcPos-bhw/2,vcPos-bvw/2);
          const [x2,y2]=wp(hcPos+bhw/2,vcPos+bvw/2);
          ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.max(Math.abs(x2-x1),2),Math.max(Math.abs(y2-y1),2));
        } else if(g.type==='Square'){
          const s2=(g.wx||0.2);
          const [x1,y1]=wp(hcPos-s2/2,vcPos-s2/2);
          const [x2,y2]=wp(hcPos+s2/2,vcPos+s2/2);
          ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.max(Math.abs(x2-x1),2),Math.max(Math.abs(y2-y1),2));
        } else if(g.type==='Cone'){
          const gAx=(g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
          const viewPerp=(plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
          const r1=g.r||0.2, r2=g.r2||0, h=g.h||0.3;
          if(viewPerp){
            const maxR=Math.max(r1,r2);
            const [px,py]=wp(hcPos,vcPos);
            const [px2]=wp(hcPos+maxR,vcPos);
            ctx.arc(px,py,Math.max(Math.abs(px2-px),1),0,Math.PI*2);
          } else {
            const axAlongH=(gAx===ax.h.toUpperCase());
            const negative=g.axis&&g.axis[0]==='-';
            const [baseR,tipR]=negative?[r2,r1]:[r1,r2];
            if(axAlongH){
              const [lx,ly]=wp(hcPos-h/2,vcPos-baseR);
              const [lx2,ly2]=wp(hcPos-h/2,vcPos+baseR);
              const [rx,ry]=wp(hcPos+h/2,vcPos+tipR);
              const [rx2,ry2]=wp(hcPos+h/2,vcPos-tipR);
              ctx.moveTo(lx,ly);ctx.lineTo(lx2,ly2);ctx.lineTo(rx,ry);ctx.lineTo(rx2,ry2);ctx.closePath();
            } else {
              const [tlx,tly]=wp(hcPos-tipR,vcPos+h/2);
              const [trx,try_]=wp(hcPos+tipR,vcPos+h/2);
              const [brx,bry]=wp(hcPos+baseR,vcPos-h/2);
              const [blx,bly]=wp(hcPos-baseR,vcPos-h/2);
              ctx.moveTo(blx,bly);ctx.lineTo(brx,bry);ctx.lineTo(trx,try_);ctx.lineTo(tlx,tly);ctx.closePath();
            }
          }
        } else if(g.type==='Pyramid'){
          const gAx=(g.axis||'+Z').replace(/[+-]/g,'').toUpperCase();
          const viewPerp=(plane==='XY'&&gAx==='Z')||(plane==='XZ'&&gAx==='Y')||(plane==='YZ'&&gAx==='X');
          const wx=g.wx||0.2, wz_=g.wz||wx, h=g.h||0.3;
          if(viewPerp){
            const [x1,y1]=wp(hcPos-wx/2,vcPos-wz_/2);
            const [x2,y2]=wp(hcPos+wx/2,vcPos+wz_/2);
            ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.max(Math.abs(x2-x1),2),Math.max(Math.abs(y2-y1),2));
          } else {
            const axAlongH=(gAx===ax.h.toUpperCase());
            const negative=g.axis&&g.axis[0]==='-';
            const bw=(plane==='XZ')?wx/2:(plane==='YZ')?wz_/2:(axAlongH?wz_/2:wx/2);
            if(axAlongH){
              const [tipX,tipY]=negative?wp(hcPos-h/2,vcPos):wp(hcPos+h/2,vcPos);
              const [b1x,b1y]=negative?wp(hcPos+h/2,vcPos-bw):wp(hcPos-h/2,vcPos-bw);
              const [b2x,b2y]=negative?wp(hcPos+h/2,vcPos+bw):wp(hcPos-h/2,vcPos+bw);
              ctx.moveTo(tipX,tipY);ctx.lineTo(b1x,b1y);ctx.lineTo(b2x,b2y);ctx.closePath();
            } else {
              const [tipX,tipY]=negative?wp(hcPos,vcPos-h/2):wp(hcPos,vcPos+h/2);
              const [brx,bry]=negative?wp(hcPos+bw,vcPos+h/2):wp(hcPos+bw,vcPos-h/2);
              const [blx,bly]=negative?wp(hcPos-bw,vcPos+h/2):wp(hcPos-bw,vcPos-h/2);
              ctx.moveTo(tipX,tipY);ctx.lineTo(brx,bry);ctx.lineTo(blx,bly);ctx.closePath();
            }
          }
        } else if(g.type==='Prism'||g.type==='Triangle'||g.type==='Hexagon'){
          const presetKey = g.preset || g.type.toLowerCase();
          const verts=PRISM_PRESETS[presetKey], sc=g.scale||1;
          if(verts){
            verts.forEach(([vx,vy],i)=>{
              const [px,py]=wp(hcPos+vx*sc,vcPos+vy*sc);
              i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
            });
            ctx.closePath();
          }
        } else if(g.type==='Polygon'){
          const verts=g.polyVerts||[[-0.5,-0.5],[0.5,-0.5],[0,0.5]], sc=g.scale||1;
          verts.forEach(([vx,vy],i)=>{
            const [px,py]=wp(hcPos+vx*sc,vcPos+vy*sc);
            i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
          });
          ctx.closePath();
        }
        ctx.fill(); ctx.stroke();
      }
  });

  function drawArrow(ax,ay,dir,col){
    const len=14, hw=5;
    ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=2;
    let dx=0,dy=0;
    if(dir==='+X'||dir==='+x') dx=1;
    else if(dir==='-X'||dir==='−X') dx=-1;
    else if(dir==='+Y'||dir==='+y') dy=-1; // canvas Y flipped
    else if(dir==='-Y'||dir==='−Y') dy=1;
    else if(dir==='+Z'||dir==='+z') dy=-1;
    else if(dir==='-Z'||dir==='−Z') dy=1;
    const ex2=ax+dx*len, ey2=ay+dy*len;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ex2,ey2); ctx.stroke();
    // arrowhead
    const angle=Math.atan2(dy,dx);
    ctx.beginPath();
    ctx.moveTo(ex2,ey2);
    ctx.lineTo(ex2-hw*Math.cos(angle-0.4),ey2-hw*Math.sin(angle-0.4));
    ctx.lineTo(ex2-hw*Math.cos(angle+0.4),ey2-hw*Math.sin(angle+0.4));
    ctx.closePath(); ctx.fill();
  }

  // Sources
  S.sources.forEach(s=>{
    const [hc,vc]=hv(s,ax.h,ax.v);
    const szH=ax.h==='x'?s.szx:ax.h==='y'?s.szy:s.szz||0;
    const szV=ax.v==='y'?s.szy:ax.v==='z'?s.szz||0:s.szx;
    const dir=s.srcDir||'+X';
    const col='rgba(0,229,255,0.9)';
    ctx.strokeStyle='rgba(0,229,255,0.6)'; ctx.lineWidth=1.5;
    if(s.type==='PlaneWave'){
      for(let yy=-3;yy<=3;yy++){
        const py=oy+yy*(H-pad*2)/8;
        ctx.beginPath();ctx.moveTo(pad+2,py);ctx.lineTo(pad+20,py);
        ctx.moveTo(pad+20,py);ctx.lineTo(pad+14,py-5);ctx.moveTo(pad+20,py);ctx.lineTo(pad+14,py+5);
        ctx.stroke();
      }
    } else if(s.type==='RandomDipoles'){
      for(let i=0;i<Math.min(s.ndip||6,10);i++){
        const [px,py]=wp(hc+(Math.random()-.5)*(s.rw||0.5), vc+(Math.random()-.5)*(s.rh||0.05));
        ctx.fillStyle='rgba(0,229,255,0.85)'; ctx.beginPath(); ctx.arc(px,py,3,0,Math.PI*2); ctx.fill();
      }
    } else if(szH>0||szV>0){
      // Extended source — project onto view plane
      // szH=0 means source has no extent on this view's horizontal axis (edge-on or out-of-plane)
      // szV=0 means source has no extent on this view's vertical axis
      const rw = szH * scX;
      const rh = szV * scY;
      const [dpx, dpy] = wp(hc, vc);

      if(szH > 0 && szV > 0) {
        // Source spans both axes — filled rectangle (centered)
        ctx.fillStyle='rgba(0,229,255,0.10)';
        const [cpx2,cpy2]=wp(hc, vc);
        ctx.fillRect(cpx2-rw/2, cpy2-rh/2, rw, rh);
        ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(0,229,255,0.6)';
        ctx.strokeRect(cpx2-rw/2, cpy2-rh/2, rw, rh); ctx.setLineDash([]);
      } else if(szH > 0) {
        // Source is a horizontal line in this view (zero vertical extent)
        const [px,py]=wp(hc-szH/2, vc);
        ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(0,229,255,0.85)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+rw,py); ctx.stroke();
        ctx.setLineDash([]);
      } else {
        // szV > 0, szH=0 — source is a vertical line in this view (e.g. YZ plane seen from XY)
        const [px,py]=wp(hc, vc);
        ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(0,229,255,0.85)'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.moveTo(px, py-rh/2); ctx.lineTo(px, py+rh/2); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.fillStyle=col; ctx.beginPath(); ctx.arc(dpx,dpy,3,0,Math.PI*2); ctx.fill();
      drawArrow(dpx,dpy,dir,col);
    } else {
      // Point source OR out-of-plane source (extent only on the axis not shown in this view)
      const szOop = ax.h==='x'&&ax.v==='y' ? s.szz||0
                  : ax.h==='x'&&ax.v==='z' ? s.szy||0
                  : s.szx||0;
      const [px,py]=wp(hc,vc);
      if(szOop > 0) {
        // Out-of-plane source — show as ⊙ (circle with cross) to indicate depth extent
        ctx.setLineDash([]);
        ctx.strokeStyle='rgba(0,229,255,0.6)'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.arc(px,py,7,0,Math.PI*2); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px-4,py); ctx.lineTo(px+4,py);
        ctx.moveTo(px,py-4); ctx.lineTo(px,py+4); ctx.stroke();
        ctx.fillStyle=col; ctx.beginPath(); ctx.arc(px,py,2.5,0,Math.PI*2); ctx.fill();
      } else {
        // True point source — dashed vertical line + dot + arrow
        ctx.setLineDash([4,3]); ctx.strokeStyle='rgba(0,229,255,0.45)';
        ctx.beginPath(); ctx.moveTo(px,pad); ctx.lineTo(px,H-pad); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle=col; ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
      }
      drawArrow(px,py,dir,col);
    }
  });

  // Monitors — project onto plane
  // A monitor with sizeX,sizeY,sizeZ: on each 2D plane, extract the 2 relevant dims
  // If the monitor's "zero" axis matches the plane's view → show as filled rectangle
  // Otherwise show as a line (the cross-section)
  const mc={transmission:'rgba(16,217,138,.85)',reflection:'rgba(239,68,68,.85)',substrate:'rgba(236,72,153,.85)',nearfar:'rgba(0,229,255,.85)'};
  S.monitors.forEach(m=>{
    const col=mc[m.type];
    const [hc,vc]=hv(m,ax.h,ax.v);
    // Monitor sizes along each world axis
    const msx=m.msx||0, msy=m.msy||0, msz=m.msz||0;
    // Project sizes onto h and v canvas axes
    const szH=ax.h==='x'?msx:ax.h==='y'?msy:msz;
    const szV=ax.v==='y'?msy:ax.v==='z'?msz:msx;
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.setLineDash([6,3]);
    if(szH>0&&szV>0){
      // Rectangle — monitor spans both axes of this view (centered)
      ctx.fillStyle=col.replace('0.85','0.12');
      const [cpx2,cpy2]=wp(hc, vc);
      ctx.fillRect(cpx2-szH/2*scX, cpy2-szV/2*scY, szH*scX, szV*scY);
      ctx.strokeRect(cpx2-szH/2*scX, cpy2-szV/2*scY, szH*scX, szV*scY);
    } else if(szH>0){
      // Horizontal line
      const [px,py]=wp(hc,vc);
      ctx.beginPath(); ctx.moveTo(px-szH/2*scX,py); ctx.lineTo(px+szH/2*scX,py); ctx.stroke();
    } else if(szV>0){
      // Vertical line (centered on vc)
      const [px,py]=wp(hc,vc);
      ctx.beginPath(); ctx.moveTo(px,py-szV/2*scY); ctx.lineTo(px,py+szV/2*scY); ctx.stroke();
    } else {
      // Point or full-span line
      const [px,py]=wp(hc,vc);
      ctx.beginPath(); ctx.moveTo(px,pad); ctx.lineTo(px,H-pad); ctx.stroke();
    }
    ctx.setLineDash([]);
    const [dpx,dpy]=wp(hc,vc);
    ctx.fillStyle=col; ctx.beginPath(); ctx.arc(dpx,dpy,3,0,Math.PI*2); ctx.fill();
  });

  // Axis labels
  ctx.fillStyle='rgba(0,229,255,0.6)'; ctx.font='bold 10px IBM Plex Mono,monospace';
  ctx.textAlign='center'; ctx.fillText(ax.hLabel, W/2, H-3);
  ctx.save(); ctx.translate(10,H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(ax.vLabel,0,0); ctx.restore();
  ctx.fillStyle='rgba(74,103,133,0.7)'; ctx.font='9px IBM Plex Mono,monospace'; ctx.textAlign='left';
  ctx.fillText(`${ax.h.toUpperCase()}=${hsz}`,pad+2,H-pad+12);
  ctx.fillText(`${ax.v.toUpperCase()}=${vsz}`,2,pad+10);
}

// ─── STACK CANVAS ─────────────────────────────────────────────────────────
function drawStack() {
  const c=document.getElementById('cstack');if(!c)return;
  const ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);ctx.fillStyle='#07090f';ctx.fillRect(0,0,W,H);
  if(!S.layers.length){
    ctx.fillStyle='#4a6785';ctx.font='12px Outfit,sans-serif';ctx.textAlign='center';
    ctx.fillText('Add layers below to see stack view',W/2,H/2);return;
  }
  const sa = S.layers_stackAxis || 'Y';
  const total=S.layers.reduce((a,l)=>a+l.t,0)||1;
  const pad=20,bw=W-120,bx=60;
  let cy=pad;
  S.layers.forEach(l=>{
    const lh=Math.max(22,(l.t/total)*(H-pad*2));
    ctx.fillStyle=MAT_COLORS[l.mat]||'rgba(150,150,200,0.4)';
    ctx.fillRect(bx,cy,bw,lh);
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.strokeRect(bx,cy,bw,lh);
    ctx.fillStyle='rgba(222,230,240,0.9)';ctx.font='11px Outfit,sans-serif';ctx.textAlign='center';
    if(lh>14)ctx.fillText(`${l.name} · ${MAT_LABELS[l.mat]||l.mat}`,bx+bw/2,cy+lh/2+4);
    ctx.textAlign='right';ctx.fillStyle='rgba(0,229,255,0.8)';ctx.font='10px IBM Plex Mono,monospace';
    ctx.fillText(`${l.t}a`,bx-5,cy+lh/2+4);
    cy+=lh;
  });
  // Draw stacking axis label
  ctx.fillStyle='rgba(0,229,255,0.5)';ctx.font='10px IBM Plex Mono,monospace';ctx.textAlign='left';
  ctx.fillText(`↕ ${sa} axis`,4,H-6);
}

// ─── REFRESH ALL VIEWS ─────────────────────────────────────────────────────
function refreshViews() {
  draw2D('c2d', S.view2dPlane);
  drawStack();
  build3DScene();
}

// ─── PERIODIC ARRAY CARD HTML ────────────────────────────────────────────────
function perArrayCardHTML(p, pi) {
  const pg = getPerGeoForArray(p);
  const total = p.nx * p.ny * (S.cell.dim==='3D' ? (p.nz||1) : 1);
  const is3D = S.cell.dim==='3D';

  // Geometry source block
  let srcBlock = '';
  if (S.geo.length === 0) {
    srcBlock = '<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--dim)">'+
      '⚠ No geometry objects yet — <strong style="color:var(--cyan)">add objects in Stage 2 first</strong>.</div>';
  } else {
    const opts = S.geo.map(g => {
      const label = g.type + ' #' + g.id + ' — ' + (MAT_LABELS[g.mat]||g.mat||'?');
      return '<option value="' + g.id + '"' + (p.geoId===g.id?' selected':'') + '>' + label + '</option>';
    }).join('');
    let preview = '';
    if (pg) {
      let dims = '';
      if (pg.type==='Cylinder') dims = '· r='+pg.r+', h='+pg.h;
      else if (pg.type==='Sphere'||pg.type==='Circle') dims = '· r='+pg.r;
      else if (pg.type==='Block') dims = '· '+pg.wx+'×'+pg.wy+'×'+(pg.wz||'∞');
      else if (pg.type==='Rectangle') dims = '· '+pg.wx+'×'+pg.wy;
      else if (pg.type==='Square') dims = '· side='+pg.wx;
      else if (pg.type==='Cone') dims = '· r_base='+pg.r+', r_tip='+(pg.r2||0)+', h='+pg.h;
      else if (pg.type==='Pyramid') dims = '· base='+pg.wx+'×'+(pg.wz||pg.wx)+', h='+pg.h;
      else if (pg.type==='Prism') dims = '· '+(pg.preset||'')+', scale='+(pg.scale||1)+', h='+pg.h;
      else if (pg.type==='Triangle') dims = '· scale='+(pg.scale||1);
      else if (pg.type==='Hexagon') dims = '· scale='+(pg.scale||0.6);
      else if (pg.type==='Polygon') dims = '· '+((pg.polyVerts&&pg.polyVerts.length)||3)+' vertices, scale='+(pg.scale||1);
      preview = '<div style="background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:6px;padding:8px 12px;font-size:11px;color:var(--dim);line-height:1.8;margin-top:6px;margin-bottom:6px">'+
        '<span style="color:var(--violet);font-weight:700">'+pg.type+'</span> '+dims+
        ' &nbsp;·&nbsp; <span style="color:var(--cyan)">'+(MAT_LABELS[pg.mat]||pg.mat||'?')+'</span></div>';
    }
    srcBlock = '<div class="fg"><label>Stamp object</label>'+
      '<select onchange="updPer('+p.id+',\'geoId\',+this.value||this.value);renderStage(cur)">'+opts+'</select></div>'+preview;
  }

  // Nz field
  const nzField = is3D
    ? '<div class="fg"><label>Nz</label><input type="number" value="'+(p.nz||1)+'" min="1" oninput="updPer('+p.id+',\'nz\',+this.value);renderStage(cur)"></div>'
    : '<div class="fg"><label style="color:var(--dim)">Nz (3D only)</label><input type="number" value="1" disabled></div>';
  const azField = is3D
    ? '<div class="fg"><label>Period Z (az)</label><input type="number" value="'+(p.az||0.4)+'" step="0.05" min="0.01" oninput="updPer('+p.id+',\'az\',+this.value)"></div>'
    : '<div></div>';

  const nxnz = (p.nz||1)>1 ? ('×'+p.nz) : '';
  return '<div class="card" style="border-color:var(--violet);margin-bottom:10px">'+
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
      '<span style="font-size:11px;font-weight:700;color:var(--violet);letter-spacing:.04em">ARRAY '+(pi+1)+'</span>'+
      '<span style="font-size:10px;color:var(--dim);margin-left:auto">'+p.nx+'×'+p.ny+(is3D&&(p.nz||1)>1?'×'+p.nz:'')+' = '+total+' objects</span>'+
      '<button onclick="remPerArray('+p.id+')" style="background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:5px;padding:2px 8px;font-size:10px;color:#ef4444;cursor:pointer;margin-left:4px">✕ Remove</button>'+
    '</div>'+
    '<div class="sdiv" style="font-size:10px;margin-top:0">Source Geometry</div>'+
    srcBlock+
    '<div class="sdiv" style="font-size:10px">Grid Count &amp; Period</div>'+
    '<div class="grid3">'+
      '<div class="fg"><label>Nx</label><input type="number" value="'+p.nx+'" min="1" oninput="updPer('+p.id+',\'nx\',+this.value);renderStage(cur)"></div>'+
      '<div class="fg"><label>Ny</label><input type="number" value="'+p.ny+'" min="1" oninput="updPer('+p.id+',\'ny\',+this.value);renderStage(cur)"></div>'+
      nzField+
    '</div>'+
    '<div class="grid3">'+
      '<div class="fg"><label>Period X (ax)</label><input type="number" value="'+p.ax+'" step="0.05" min="0.01" oninput="updPer('+p.id+',\'ax\',+this.value)"></div>'+
      '<div class="fg"><label>Period Y (ay)</label><input type="number" value="'+p.ay+'" step="0.05" min="0.01" oninput="updPer('+p.id+',\'ay\',+this.value)"></div>'+
      azField+
    '</div>'+
    '<div class="sdiv" style="font-size:10px">Array Centre Offset <span class="tip" data-t="Shifts this array from the cell centre.">?</span></div>'+
    '<div class="grid3">'+
      '<div class="fg"><label>cx\u2080</label><input type="number" value="'+(p.cx0||0)+'" step="0.1" oninput="updPer('+p.id+',\'cx0\',+this.value)"></div>'+
      '<div class="fg"><label>cy\u2080</label><input type="number" value="'+(p.cy0||0)+'" step="0.1" oninput="updPer('+p.id+',\'cy0\',+this.value)"></div>'+
      '<div class="fg"><label>cz\u2080</label><input type="number" value="'+(p.cz0||0)+'" step="0.1" oninput="updPer('+p.id+',\'cz0\',+this.value)"></div>'+
    '</div>'+
  '</div>';
}
function perArraysHTML() {
  if (S.perArrays.length === 0) {
    return '<div style="background:rgba(124,58,237,.05);border:1px dashed rgba(124,58,237,.3);border-radius:8px;padding:14px 16px;font-size:12px;color:var(--dim);text-align:center">'+

// Map 2D shape types to MEEP equivalents for script gen
const SHAPE2D_MEEP = {Rectangle:'Block', Square:'Block', Circle:'Cylinder', Triangle:'Prism', Hexagon:'Prism', Polygon:'Prism'};
const SHAPE2D_BADGE = {Rectangle:'badge-v', Square:'badge-v', Circle:'badge-c', Triangle:'badge-g', Hexagon:'badge-a', Polygon:'badge-p'};

// ─── AXIS TOGGLE (Cone / Cylinder / Pyramid) ─────────────────────────────
function axisToggleHTML(g) {
  const axes = [
    {val:'+X', label:'+X', sub:'base in YZ'},
    {val:'-X', label:'−X', sub:'base in YZ'},
    {val:'+Y', label:'+Y', sub:'base in XZ'},
    {val:'-Y', label:'−Y', sub:'base in XZ'},
    {val:'+Z', label:'+Z', sub:'base in XY'},
    {val:'-Z', label:'−Z', sub:'base in XY'},
  ];
  const btnStyle = (val) => {
    const active = g.axis === val;
    return `style="flex:1;padding:6px 4px;border-radius:6px;border:1px solid ${active?'var(--cyan)':'var(--border)'};background:${active?'rgba(0,229,255,.12)':'var(--surf2)'};color:${active?'var(--cyan)':'var(--dim)'};cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-align:center;transition:all .15s"`;
  };
  return `
  <div style="margin-top:8px">
    <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:6px">
      Axis / Orientation <span class="tip" data-t="Which direction the symmetry axis points. Determines base plane, 3D orientation, 2D cross-sections, and the axis= parameter in the generated script.">?</span>
    </div>
    ${g.axis===null ? `<div style="font-size:11px;color:var(--amber);background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:5px;padding:6px 10px;margin-bottom:7px">⚠ Select an axis direction — required for correct 3D rendering and script generation.</div>` : ''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px">
      ${axes.map(a=>`
        <button ${btnStyle(a.val)} onclick="updG(${g.id},'axis','${a.val}');renderStage(cur)">
          ${a.label}<br><span style="font-size:9px;font-weight:400;opacity:.75">${a.sub}</span>
        </button>`).join('')}
    </div>
  </div>`;
}

function geoHTML(g) {
  const is2D = S.cell.dim==='2D';
  const mo=allMatOptions(g.mat);

  // ── 2D mode shape fields ──────────────────────────────────────────────────
  if(is2D) {
    let shF='';
    if(g.type==='Rectangle'){
      shF=`<div class="grid2">
        ${infBtnHTML(g.id,'wx',g.wx||2,0.5,'Width')}
        ${infBtnHTML(g.id,'wy',g.wy||1,0.5,'Height')}
      </div>`;
    } else if(g.type==='Square'){
      shF=`<div class="fg"><label>Side length</label><input type="number" value="${g.wx||1}" step="0.5" oninput="updG(${g.id},'wx',+this.value);updG(${g.id},'wy',+this.value)"></div>`;
    } else if(g.type==='Circle'){
      shF=`<div class="fg"><label>Radius</label><input type="number" value="${g.r||0.5}" step="0.1" oninput="updG(${g.id},'r',+this.value)"></div>`;
    } else if(g.type==='Triangle'){
      shF=`<div class="fg"><label>Size (scale)</label><input type="number" value="${g.scale||1}" step="0.1" min="0.1" oninput="updG(${g.id},'scale',+this.value)"></div>`;
    } else if(g.type==='Hexagon'){
      shF=`<div class="fg"><label>Size (scale)</label><input type="number" value="${g.scale||1}" step="0.1" min="0.1" oninput="updG(${g.id},'scale',+this.value)"></div>`;
    } else if(g.type==='Polygon'){
      const vStr = (g.polyVerts||[[0,0.5],[0.5,-0.5],[-0.5,-0.5]]).map(([x,y])=>`${x},${y}`).join(' | ');
      shF=`<div class="fg">

    })();
    return `<div class="card" id="geo-${g.id}">
      <div class="card-hdr">
        <span class="badge ${badgeCls}">${g.type}</span>${_bb2}
        <div style="display:flex;align-items:center;gap:8px;flex:1;margin-left:8px">
          <div class="opacity-row" style="flex:1">
            <label>Opacity</label>
            <input type="range" min="0.05" max="1" step="0.05" value="${g.opacity||0.65}" oninput="updG(${g.id},'opacity',+this.value);this.nextElementSibling.textContent=Math.round(+this.value*100)+'%'" style="flex:1">
            <span class="opacity-val">${Math.round((g.opacity||0.65)*100)}%</span>
          </div>
        </div>
        <button class="xbtn" onclick="remG(${g.id})">✕</button>
      </div>
      <div class="grid2">
        <div class="fg"><label>Center ${S.view2dPlane[0]}</label><input type="number" value="${g.cx||0}" step="0.5" oninput="updG(${g.id},'cx',+this.value)"></div>
        <div class="fg"><label>Center ${S.view2dPlane[1]}</label><input type="number" value="${g.cy||0}" step="0.5" oninput="updG(${g.id},'cy',+this.value)"></div>
      </div>
      ${shF}
      ${['Rectangle','Square','Triangle','Hexagon','Polygon'].includes(g.type) ? `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
        <label style="font-size:11px;font-weight:700;color:var(--dim);white-space:nowrap;min-width:60px">Rotation</label>
        <input type="range" min="-180" max="180" step="1" value="${g.rot||0}"
          style="flex:1;min-width:80px"
          oninput="updG(${g.id},'rot',+this.value);this.nextElementSibling.value=this.value">
        <input type="number" min="-180" max="180" step="1" value="${g.rot||0}"
          style="width:60px;font-family:'IBM Plex Mono',monospace;font-size:11px"
          oninput="updG(${g.id},'rot',+this.value);this.previousElementSibling.value=this.value">
        <span style="font-size:10px;color:var(--dim)">°</span>
        ${(g.rot||0)!==0?`<button style="padding:1px 7px;font-size:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer"
          onclick="updG(${g.id},'rot',0);renderStage(cur)">reset</button>`:''}
      </div>` : ''}
      <div class="fg"><label>Material</label><select onchange="updG(${g.id},'mat',this.value);renderStage(cur)">${mo}</select></div>
      ${g.mat==='custom'?`<div class="fg"><label>Custom ε</label><input type="number" value="${g.eps||1}" step="0.1" oninput="updG(${g.id},'eps',+this.value)"></div>`:''}
    </div>`;
  }

  // ── 3D mode shape fields ──────────────────────────────────────────────────
  let shF='';
  if(g.type==='Block') shF=`<div class="grid3">${infBtnHTML(g.id,'wx',g.wx,0.5,'Width X')}${infBtnHTML(g.id,'wy',g.wy,0.5,'Height Y')}${infBtnHTML(g.id,'wz',g.wz,0.5,'Depth Z')}</div>`;
  else if(g.type==='Cylinder') shF=`
    <div class="grid2"><div class="fg"><label>Radius</label><input type="number" value="${g.r}" step="0.1" oninput="updG(${g.id},'r',+this.value)"></div><div class="fg"><label>Height</label><input type="number" value="${g.h}" step="0.5" oninput="updG(${g.id},'h',+this.value)"></div></div>
    ${axisToggleHTML(g)}`;
  else if(g.type==='Sphere') shF=`<div class="fg"><label>Radius</label><input type="number" value="${g.r}" step="0.1" oninput="updG(${g.id},'r',+this.value)"></div>`;
  else if(g.type==='Cone') shF=`<div class="grid3">
    <div class="fg"><label>Base Radius <span class="tip" data-t="Bottom radius of the cone (r in mp.Cone)">?</span></label><input type="number" value="${g.r||0.5}" step="0.1" min="0" oninput="updG(${g.id},'r',+this.value)"></div>
    <div class="fg"><label>Top Radius <span class="tip" data-t="Top radius — 0 = sharp point, >0 = truncated cone (frustum). Uses mp.Cone radius2.">?</span></label><input type="number" value="${g.r2!==undefined?g.r2:0}" step="0.1" min="0" oninput="updG(${g.id},'r2',+this.value)"></div>
    <div class="fg"><label>Height</label><input type="number" value="${g.h||1}" step="0.5" min="0.1" oninput="updG(${g.id},'h',+this.value)"></div>
  </div>
  ${axisToggleHTML(g)}`;
  else if(g.type==='Pyramid') shF=`<div class="grid3">
    <div class="fg"><label>Base Width X <span class="tip" data-t="Square pyramid base size in X">?</span></label><input type="number" value="${g.wx||1}" step="0.1" min="0.1" oninput="updG(${g.id},'wx',+this.value)"></div>
    <div class="fg"><label>Base Width Z <span class="tip" data-t="Square pyramid base size in Z">?</span></label><input type="number" value="${g.wz||1}" step="0.1" min="0.1" oninput="updG(${g.id},'wz',+this.value)"></div>
    <div class="fg"><label>Height</label><input type="number" value="${g.h||1}" step="0.5" min="0.1" oninput="updG(${g.id},'h',+this.value)"></div>
  </div>
  <div style="font-size:10px;color:var(--amber);margin-top:2px">⚠ MEEP has no native pyramid — generated as mp.Cone with equivalent circular cross-section.</div>
  ${axisToggleHTML(g)}`;
  else if(g.type==='Prism') shF=`<div class="grid2">
    <div class="fg"><label>Preset Shape</label><select onchange="updG(${g.id},'preset',this.value)">
      ${['triangle','hexagon','lshape','pentagon'].map(p=>`<option value="${p}" ${g.preset===p?'selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Scale</label><input type="number" value="${g.scale||1}" step="0.1" min="0.1" oninput="updG(${g.id},'scale',+this.value)"></div>
    <div class="fg"><label>Height (Z extrusion)</label><input type="number" value="${g.h||1}" step="0.5" oninput="updG(${g.id},'h',+this.value)"></div>
  </div>`;
  return `<div class="card" id="geo-${g.id}">
    <div class="card-hdr"><span class="badge badge-c">${g.type}</span>
      ${['Cone','Cylinder','Pyramid'].includes(g.type) && g.axis===null
        ? `<span class="badge" style="background:rgba(245,158,11,.2);color:var(--amber);margin-left:4px">⚠ pick axis</span>`
        : ['Cone','Cylinder','Pyramid'].includes(g.type)
          ? `<span class="badge" style="background:rgba(16,217,138,.12);color:var(--green);margin-left:4px">axis ${g.axis}</span>`
          : ''}
      ${(()=>{
        const ws = getWarnings().filter(w=>w.code==='W9'&&w.msg.includes(`Object ${S.geo.indexOf(g)+1}`));
        if(!ws.length) return '';
        const isErr = ws.some(w=>w.level==='error');
        return `<span class="badge" style="background:${isErr?'rgba(239,68,68,.2)':'rgba(245,158,11,.2)'};color:${isErr?'#f87171':'var(--amber)'};margin-left:4px">${isErr?'⚠ outside cell':'⚠ in PML'}</span>`;
      })()}
      <div style="display:flex;align-items:center;gap:8px;flex:1;margin-left:8px">
        <div class="opacity-row" style="flex:1">
          <input type="range" min="0.05" max="1" step="0.05" value="${g.opacity||0.65}" oninput="updG(${g.id},'opacity',+this.value);this.nextElementSibling.textContent=Math.round(+this.value*100)+'%'" style="flex:1">
          <span class="opacity-val">${Math.round((g.opacity||0.65)*100)}%</span>
        </div>
      </div>
      <button class="xbtn" onclick="remG(${g.id})">✕</button>
    </div>
    <div class="grid3">
      <div class="fg"><label>Center X</label><input type="number" value="${g.cx}" step="0.5" oninput="updG(${g.id},'cx',+this.value)"></div>
      <div class="fg"><label>Center Y</label><input type="number" value="${g.cy}" step="0.5" oninput="updG(${g.id},'cy',+this.value)"></div>
      <div class="fg"><label>Center Z</label><input type="number" value="${g.cz||0}" step="0.5" oninput="updG(${g.id},'cz',+this.value)"></div>
    </div>
    ${shF}
    ${['Block','Prism'].includes(g.type) ? `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
      <label style="font-size:11px;font-weight:700;color:var(--dim);white-space:nowrap;min-width:60px">Rotation Y</label>
      <input type="range" min="-180" max="180" step="1" value="${g.rot||0}"
        style="flex:1;min-width:80px"
        oninput="updG(${g.id},'rot',+this.value);this.nextElementSibling.value=this.value">
      <input type="number" min="-180" max="180" step="1" value="${g.rot||0}"
        style="width:60px;font-family:'IBM Plex Mono',monospace;font-size:11px"
        oninput="updG(${g.id},'rot',+this.value);this.previousElementSibling.value=this.value">
      <span style="font-size:10px;color:var(--dim)">°</span>
      ${(g.rot||0)!==0?`<button style="padding:1px 7px;font-size:10px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer"
        onclick="updG(${g.id},'rot',0);renderStage(cur)">reset</button>`:''}
    </div>` : ''}
    <div class="fg"><label>Material</label><select onchange="updG(${g.id},'mat',this.value);renderStage(cur)">${mo}</select></div>
    ${g.mat==='custom'?`<div class="fg"><label>Custom ε</label><input type="number" value="${g.eps||1}" step="0.1" oninput="updG(${g.id},'eps',+this.value)"></div>`:''}
  </div>`;
}

    <div class="card-hdr"><span class="badge badge-g">Layer</span>
      <div style="display:flex;align-items:center;gap:8px;flex:1;margin-left:8px">
        <div class="opacity-row" style="flex:1">
          <label>Opacity</label>
          <input type="range" min="0.05" max="1" step="0.05" value="${l.opacity||0.45}" oninput="updL(${l.id},'opacity',+this.value);this.nextElementSibling.textContent=Math.round(+this.value*100)+'%'" style="flex:1">
          <span class="opacity-val">${Math.round((l.opacity||0.45)*100)}%</span>
