<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEP Builder v5</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
:root{
  --bg:#07090f;--surf:#0d1117;--surf2:#131a24;--surf3:#1a2332;
  --border:#1e2d3d;--border2:#243547;
  --cyan:#00e5ff;--violet:#7c3aed;--green:#10d98a;--amber:#f59e0b;--red:#ef4444;--pink:#ec4899;
  --text:#dde6f0;--dim:#4a6785;--muted:#1e3048;
  --sidebar:200px;--script:340px;
}
body.light{
  --bg:#f0f2f7;--surf:#ffffff;--surf2:#f4f6fb;--surf3:#e8ecf4;
  --border:#d1d9e6;--border2:#bbc5d6;
  --cyan:#0088aa;--violet:#6d28d9;--green:#059669;--amber:#d97706;--red:#dc2626;--pink:#db2777;
  --text:#1a1d27;--dim:#6b7280;--muted:#dde3ee;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{height:48px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;letter-spacing:-.5px;}
.logo-gem{width:26px;height:26px;background:linear-gradient(135deg,var(--cyan),var(--violet));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.logo span{color:var(--cyan);}.logo em{color:var(--dim);font-style:normal;font-size:11px;margin-left:4px;font-weight:400;}
.hbtns{display:flex;gap:8px;}
.btn{padding:6px 14px;border-radius:5px;border:none;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
.btn-g{background:transparent;color:var(--dim);border:1px solid var(--border);}.btn-g:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-c{background:var(--cyan);color:#000;}.btn-c:hover{background:#00c8e8;}
.btn-s{background:var(--green);color:#000;}.btn-s:hover{background:#0cbf79;}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sidebar);background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.sb-sec{padding:10px 12px 4px;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.stage{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;font-size:12px;font-weight:600;color:var(--dim);}
.stage:hover{background:var(--surf2);color:var(--text);}
.stage.active{border-left-color:var(--cyan);background:var(--surf2);color:var(--cyan);}
.stage.done{color:var(--green);}.stage.done .snum{background:var(--green);color:#000;}
.snum{width:20px;height:20px;border-radius:50%;background:var(--border);color:var(--dim);font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stage.active .snum{background:var(--cyan);color:#000;}
.sb-foot{margin-top:auto;padding:12px;border-top:1px solid var(--border);}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--violet));border-radius:2px;transition:width .3s;}
.prog-lbl{font-size:10px;color:var(--dim);}
.form-panel{flex:1;overflow-y:auto;padding:20px;background:var(--bg);}
.form-panel::-webkit-scrollbar{width:4px;}
.form-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sh{margin-bottom:20px;}.sh h2{font-size:20px;font-weight:800;letter-spacing:-.5px;}.sh p{font-size:12px;color:var(--dim);margin-top:3px;}
.sdiv{margin:16px 0 10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--violet);display:flex;align-items:center;gap:8px;}
.sdiv::after{content:'';flex:1;height:1px;background:var(--border);}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:5px;}
.tip{width:13px;height:13px;border-radius:50%;background:var(--border);color:var(--dim);font-size:8px;display:inline-flex;align-items:center;justify-content:center;cursor:help;position:relative;}
.tip:hover::after{content:attr(data-t);position:absolute;left:18px;top:-4px;z-index:200;background:var(--surf3);border:1px solid var(--border2);color:var(--text);font-size:11px;font-weight:400;padding:5px 9px;border-radius:5px;white-space:nowrap;pointer-events:none;letter-spacing:0;text-transform:none;box-shadow:0 4px 20px rgba(0,0,0,.5);}
input,select{background:var(--surf);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:7px 10px;font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus{border-color:var(--cyan);}
select option{background:var(--surf2);}
input[type=range]{padding:4px 0;accent-color:var(--cyan);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;}
.rgrp{display:flex;gap:6px;flex-wrap:wrap;}
.rbtn{padding:5px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'IBM Plex Mono',monospace;}
.rbtn:hover{border-color:var(--cyan);color:var(--cyan);}.rbtn.active{border-color:var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan);}
.card{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.card-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.badge{padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;font-family:'IBM Plex Mono',monospace;}
.badge-c{background:rgba(0,229,255,.15);color:var(--cyan);}
.badge-v{background:rgba(124,58,237,.2);color:#a78bfa;}
.badge-g{background:rgba(16,217,138,.15);color:var(--green);}
.badge-a{background:rgba(245,158,11,.15);color:var(--amber);}
.badge-p{background:rgba(236,72,153,.15);color:var(--pink);}
.xbtn{background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:15px;padding:2px 5px;border-radius:3px;transition:all .15s;}
.xbtn:hover{background:rgba(239,68,68,.15);color:var(--red);}
.addbtn{background:var(--surf);border:1px dashed var(--border);color:var(--dim);border-radius:7px;padding:9px;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;text-align:center;}
.addbtn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.04);}
.chkgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.chk{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--border);border-radius:5px;padding:8px 10px;cursor:pointer;transition:all .15s;font-size:12px;font-weight:600;}
.chk.on{border-color:var(--violet);background:rgba(124,58,237,.1);color:#a78bfa;}
.chkbox{width:15px;height:15px;border-radius:3px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.chk.on .chkbox{background:var(--violet);border-color:var(--violet);color:#fff;}

/* 3D VIEWER */
.viewer-wrap{background:var(--surf);border:1px solid var(--border);border-radius:8px;margin-bottom:14px;position:relative;}
.viewer-hdr{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:8px 8px 0 0;background:var(--surf);}
.viewer-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);}
.viewer-tabs{display:flex;gap:0;}
.vtab{padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;}
.vtab:hover{color:var(--text);}.vtab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.viewer-controls{display:flex;gap:6px;align-items:center;}
.ctrl-btn{background:var(--surf2);border:1px solid var(--border);color:var(--dim);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;font-family:'Outfit',sans-serif;}
.ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.view-area{display:none;}.view-area.active{display:block;line-height:0;}
.view-area canvas{display:block;}
#canvas3d{cursor:grab;display:block;}
#canvas3d:active{cursor:grabbing;}
.canvas2d-wrap{position:relative;}
canvas{display:block;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.axis-hint{position:absolute;bottom:8px;left:10px;font-size:9px;color:var(--dim);font-family:'IBM Plex Mono',monospace;pointer-events:none;line-height:1.6;}

/* legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;padding:6px 10px;border-top:1px solid var(--border);background:var(--surf2);}
.li{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim);font-weight:600;}
.ld{width:16px;height:3px;border-radius:1px;}

/* stack */
.stack-canvas-wrap{background:var(--surf2);overflow:hidden;}

/* SCRIPT — always dark regardless of theme */
.script-panel{width:var(--script);background:#0d1117;border-left:1px solid #1e2d3d;display:flex;flex-direction:column;flex-shrink:0;}
.sp-hdr{padding:10px 14px;border-bottom:1px solid #1e2d3d;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.sp-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#4a6785;}
.sp-body{flex:1;overflow-y:auto;padding:10px;}
.sp-body::-webkit-scrollbar{width:3px;}
.sp-body::-webkit-scrollbar-thumb{background:#1e2d3d;}
pre{font-family:'IBM Plex Mono',monospace;font-size:10.5px;line-height:1.65;color:#dde6f0;white-space:pre-wrap;word-break:break-all;}
.kw{color:#c084fc;}.fn{color:#60a5fa;}.st{color:#10d98a;}.nm{color:#f59e0b;}.cm{color:#4a6785;font-style:italic;}
.sp-foot{padding:10px 12px;border-top:1px solid #1e2d3d;display:flex;gap:7px;flex-shrink:0;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#000;padding:8px 16px;border-radius:6px;font-size:12px;font-weight:700;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;transform:translateY(0);}
.navbtns{display:flex;gap:8px;margin-top:20px;}
.opacity-row{display:flex;align-items:center;gap:8px;}
.opacity-row label{font-size:10px;color:var(--dim);white-space:nowrap;min-width:60px;}
.opacity-val{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--cyan);min-width:28px;}

/* ── MODE SELECTOR ── */
.mode-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:32px;padding:40px;}
.mode-title{text-align:center;}
.mode-title h1{font-size:28px;font-weight:800;letter-spacing:-1px;}
.mode-title p{font-size:13px;color:var(--dim);margin-top:6px;}
.mode-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.mode-card{width:220px;background:var(--surf);border:2px solid var(--border);border-radius:14px;padding:28px 24px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;}
.mode-card:hover{border-color:var(--cyan);background:rgba(0,229,255,.04);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,229,255,.1);}
.mode-card.selected{border-color:var(--cyan);background:rgba(0,229,255,.07);}
.mode-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.mode-card h3{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.mode-card p{font-size:11px;color:var(--dim);line-height:1.5;}
.mode-sub{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--cyan);background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:20px;padding:3px 10px;}
/* plane picker inside mode selector */
.plane-pick{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px 24px;background:var(--surf2);border-radius:10px;border:1px solid var(--border);width:100%;max-width:440px;}
.plane-pick p{font-size:11px;color:var(--dim);text-align:center;}
/* mode badge in sidebar */
.mode-badge{display:flex;align-items:center;gap:6px;background:rgba(0,229,255,.08);border:1px solid rgba(0,229,255,.2);border-radius:6px;padding:5px 9px;font-size:11px;font-weight:700;color:var(--cyan);font-family:'IBM Plex Mono',monospace;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.mode-badge:hover{background:rgba(0,229,255,.14);}
.mode-badge span{font-size:9px;color:var(--dim);font-weight:400;margin-left:2px;}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-gem">⚡</div>MEEP <span>Builder</span><em>v5.0</em></div>
  <div class="hbtns">
    <button class="btn btn-g" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme" style="font-size:15px;padding:4px 10px;">🌙</button>
    <button class="btn btn-g" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-c" onclick="copyScript()">📋 Copy</button>
    <button class="btn btn-s" onclick="downloadScript()">⬇ .py</button>
  </div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sb-sec">Stages</div>
    <div class="stage active" onclick="go(0)" id="s0"><div class="snum">1</div>Cell Setup</div>
    <div class="stage" onclick="go(1)" id="s1"><div class="snum">2</div>Geometry</div>
    <div class="stage" onclick="go(2)" id="s2"><div class="snum">3</div>Materials</div>
    <div class="stage" onclick="go(3)" id="s3"><div class="snum">4</div>Sources</div>
    <div class="stage" onclick="go(4)" id="s4"><div class="snum">5</div>Boundaries</div>
    <div class="stage" onclick="go(5)" id="s5"><div class="snum">6</div>Monitors</div>
    <div class="stage" onclick="go(6)" id="s6"><div class="snum">7</div>Run & Output</div>
    <div class="sb-foot">
      <div class="mode-badge" id="modebadge" onclick="showModeSelector()" title="Click to change simulation mode">
        <span id="modebadge-icon">⚡</span>
        <span id="modebadge-label">—</span>
        <span>change</span>
      </div>
      <div class="prog-lbl" id="plbl">Stage 1 of 7</div>
      <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:14.2%"></div></div>
    </div>
  </div>
  <div class="form-panel" id="fp"></div>
  <div class="script-panel">
    <div class="sp-hdr"><div class="sp-title">⚙ Script</div><button class="btn btn-g" style="padding:3px 9px;font-size:10px" onclick="copyScript()">Copy</button></div>
    <div class="sp-body"><pre id="sout"></pre></div>
    <div class="sp-foot">
      <button class="btn btn-c" style="flex:1" onclick="copyScript()">📋 Copy</button>
      <button class="btn btn-s" style="flex:1" onclick="downloadScript()">⬇ .py</button>
    </div>
  </div>
</div>
<div class="toast" id="toast">✓ Copied!</div>

<script>

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = {
  unit:{},
  cell:{dim:null,sx:16,sy:8,sz:2,res:10},
  view2dPlane:'XY',
  geo:[],layers:[],layers_stackAxis:'Y',
  mats:{bg:'air',customEps:1,dispMats:[]},
  perArrays:[],  // array of {id, geoId, nx, ny, nz, ax, ay, az, cx0, cy0, cz0}
  sources:[],
  bc:{
    x:'pml', y:'pml', z:'pml',
    pmlX:1.0, pmlY:1.0, pmlZ:1.0,
    absXlow:false, absXhigh:false,
    absYlow:false, absYhigh:false,
    absZlow:false, absZhigh:false,
    absXlowT:1.0, absXhighT:1.0,
    absYlowT:1.0, absYhighT:1.0,
    absZlowT:1.0, absZhighT:1.0,
    kx:0, ky:0, kz:0,
    kpointEnabled:false, kpx:0, kpy:0, kpz:0,
    symX:false, symY:false, symZ:false
  },  monitors:[],
  run:{until:200,outEz:true,outEps:true,outFlux:false,outPng:false,outHDF5:false,outSlice:false,ezInterval:0.6,sliceCx:0,sliceCy:-3.5,sliceAxis:'X',
    scatterMode:false,untilNorm:10,untilScatt:100,scatterGeoId:null,geoAreaOverride:null,fluxMargin:0.5,useUntilAfter:false,
    trMode:false,
    trGeoRun:{},              // map of geoId → 'both'|'run1'|'run2'
    trRefGeoIds:[],           // legacy — kept for backwards compat
    trReflMonId:null,        // monitor ID assigned role='refl'
    trTranMonId:null,        // monitor ID assigned role='tran'
    trStopMode:'decay',      // 'decay' | 'fixed'
    trDecayDt:50,            // stop_when_fields_decayed dT
    trDecayComp:'auto',       // field component to watch ('auto' = follow source)
    trDecayPx:0,             // decay monitor point x
    trDecayPy:0,             // decay monitor point y
    trDecayPz:0,             // decay monitor point z
    trDecayBy:1e-3,          // decay threshold
    trUntil:200,             // fallback fixed run time
    trPlotX:'wavelength',    // 'wavelength' | 'frequency'
    outDisplayFlux:false,    // emit sim.display_fluxes() in T/R/Loss mode
    outComp:'auto',          // field component for snapshots: 'auto'|'Ex'|'Ey'|'Ez'|'Hx'|'Hy'|'Hz'|'E2'
    snapPlane:'XY',          // 3D snapshot slice plane: 'XY'|'XZ'|'YZ'
    snapPos:0,               // position along normal axis for 3D slice
    sliceCz:0,               // x×t slice fixed Z position (for Z-axis slice in 3D)
    mpi:false,np:4,argparse:false}
};
let cur=0,gid=0,sid=0,mid=0;

const MAT_COL_HEX={air:0x78c8ff,silicon:0x50c864,sio2:0xc8aa50,ito:0x64c8c8,gold:0xffbe28,aluminum:0xb4b4c8,organic:0xc850b4,platinum:0xa0a0b4,custom:0xb464ff};
const MAT_COLORS={air:'rgba(120,200,255,0.25)',silicon:'rgba(80,200,100,0.6)',sio2:'rgba(200,170,80,0.4)',ito:'rgba(100,200,200,0.5)',gold:'rgba(255,190,40,0.6)',aluminum:'rgba(180,180,200,0.55)',organic:'rgba(200,80,180,0.5)',platinum:'rgba(160,160,180,0.5)',custom:'rgba(180,100,255,0.5)'};
const MAT_LABELS={air:'Air (ε=1)',silicon:'Silicon (ε=12)',sio2:'SiO₂ (ε=2.1)',ito:'ITO (ε=3.7)',gold:'Gold (Drude)',aluminum:'Aluminum (Drude)',organic:'Organic (ε=3)',platinum:'Platinum (Drude)',custom:'Custom ε'};

const PRISM_PRESETS = {
  triangle: [[-0.5,-0.5],[0.5,-0.5],[0,0.5]],
  hexagon: [[1,0],[0.5,0.866],[-0.5,0.866],[-1,0],[-0.5,-0.866],[0.5,-0.866]],
  lshape: [[-0.5,-0.5],[0,-0.5],[0,0],[0.5,0],[0.5,0.5],[-0.5,0.5]],
  pentagon: [[0,1],[0.951,0.309],[0.588,-0.809],[-0.588,-0.809],[-0.951,0.309]],
};

// ─── PERIODIC ARRAY HELPERS ──────────────────────────────────────────────
let parid = 0; // unique id counter for periodic arrays

function addPerArray() {
  parid++;
  const defaultGeoId = S.geo.length > 0 ? S.geo[0].id : null;
  S.perArrays.push({id:parid, geoId:defaultGeoId, nx:3, ny:3, nz:1, ax:0.4, ay:0.4, az:0.4, cx0:0, cy0:0, cz0:0});
  renderStage(cur); refreshViews();
}
function remPerArray(id) {
  S.perArrays = S.perArrays.filter(p=>p.id!==id);
  renderStage(cur); refreshViews();
}
function updPer(id, k, v) {
  const p = S.perArrays.find(p=>p.id===id);
  if(p){ p[k]=v; refreshViews(); updateScript(); }
}
function getPerGeoForArray(p) {
